<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetQuest – CCNA Training</title>
<style>
  :root {
    --bg: #0f1729;
    --panel: #162035;
    --border: #243a60;
    --accent: #00d4ff;
    --accent2: #0066cc;
    --green: #00bb66;
    --red: #ff4466;
    --yellow: #ffcc00;
    --text: #e0eeff;
    --muted: #6b8ab0;
    --bg-gradient1: rgba(0,100,200,0.08);
    --bg-gradient2: rgba(0,212,255,0.05);
  }

  body.light {
    --bg: #f0f4fb;
    --panel: #ffffff;
    --border: #c5d5ea;
    --accent: #0066cc;
    --accent2: #004499;
    --green: #008844;
    --red: #cc2244;
    --yellow: #996600;
    --text: #0a1628;
    --muted: #5570a0;
    --bg-gradient1: rgba(0,80,180,0.05);
    --bg-gradient2: rgba(0,120,220,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 20% 20%, var(--bg-gradient1) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, var(--bg-gradient2) 0%, transparent 60%);
    transition: background 0.3s, color 0.3s;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 640px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0 20px;
  }

  .logo {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .logo span { color: var(--text); }

  .theme-toggle {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 1rem;
    transition: border-color 0.2s, transform 0.15s;
    line-height: 1;
  }
  .theme-toggle:hover { border-color: var(--accent); transform: scale(1.08); }

  .hud {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .hud-item strong {
    font-size: 1.1rem;
    color: var(--accent);
    font-weight: 700;
  }

  /* ── XP Bar ── */
  .xp-bar-wrap {
    width: 100%;
    max-width: 640px;
    margin-bottom: 20px;
  }
  .xp-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .xp-bar {
    height: 6px;
    background: var(--panel);
    border-radius: 99px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  /* ── Screen system ── */
  .screen { display: none; width: 100%; max-width: 640px; }
  .screen.active { display: flex; flex-direction: column; gap: 16px; }

  /* ── Topic Select ── */
  .screen-title {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--accent);
    text-align: center;
    margin-bottom: 4px;
  }
  .screen-sub {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 8px;
  }

  .topic-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .topic-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .topic-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 0 20px rgba(0,212,255,0.1);
  }
  .topic-card .icon { font-size: 2rem; margin-bottom: 8px; }
  .topic-card .name { font-size: 0.9rem; font-weight: 600; }
  .topic-card .count { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .topic-card .badge {
    position: absolute;
    top: 8px; right: 8px;
    background: var(--accent2);
    color: white;
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 99px;
    font-weight: 600;
  }
  .topic-card.completed .badge { background: var(--green); color: #000; }

  /* ── Quiz Screen ── */
  .quiz-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .timer-ring {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
  }
  .timer-ring.urgent { color: var(--red); animation: pulse 0.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .progress-bar {
    height: 4px;
    background: var(--panel);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent2);
    border-radius: 99px;
    transition: width 0.3s;
  }

  .question-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
  }

  .q-category {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 12px;
    font-weight: 600;
  }

  .q-text {
    font-size: 1.05rem;
    line-height: 1.6;
    font-weight: 500;
  }

  .answers {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .answer-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 0.9rem;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .answer-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,212,255,0.05);
  }
  .answer-btn .letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .answer-btn.correct {
    border-color: var(--green);
    background: rgba(0,255,136,0.08);
    color: var(--green);
  }
  .answer-btn.correct .letter { background: var(--green); color: #000; }
  .answer-btn.wrong {
    border-color: var(--red);
    background: rgba(255,68,102,0.08);
    color: var(--red);
  }
  .answer-btn.wrong .letter { background: var(--red); color: #fff; }
  .answer-btn:disabled { cursor: default; }

  /* ── Explanation ── */
  .explanation {
    background: rgba(0,212,255,0.05);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--text);
    display: none;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); }

  /* ── Next btn ── */
  .btn-primary {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #000;
    font-weight: 700;
    font-size: 0.95rem;
    border: none;
    border-radius: 10px;
    padding: 14px 24px;
    cursor: pointer;
    transition: opacity 0.2s;
    display: none;
    align-self: flex-end;
  }
  .btn-primary.show { display: block; }
  .btn-primary:hover { opacity: 0.85; }

  /* ── Result Screen ── */
  .result-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
  }
  .result-icon { font-size: 3.5rem; margin-bottom: 12px; }
  .result-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
  .result-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 8px;
  }
  .stat-box .val { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .stat-box .lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-top: 2px; }

  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.9rem;
    border-radius: 10px;
    padding: 12px 20px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .btn-secondary:hover { border-color: var(--accent); }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 0.85rem;
    transition: transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Streaks / badges ── */
  .streak-banner {
    background: linear-gradient(135deg, #ff6b00, #ffcc00);
    border-radius: 10px;
    padding: 12px 16px;
    color: #000;
    font-weight: 700;
    font-size: 0.9rem;
    text-align: center;
    display: none;
  }
  .streak-banner.show { display: block; }

  /* ── Review Panel ── */
  .review-link {
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
    font-style: normal;
  }
  .review-link:hover { color: #fff; }

  .review-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .review-item .ri-q {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .review-item .ri-wrong {
    font-size: 0.82rem;
    color: var(--red);
    margin-bottom: 6px;
  }
  .review-item .ri-correct {
    font-size: 0.82rem;
    color: var(--green);
    margin-bottom: 10px;
  }
  .review-item .ri-explain {
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--text);
    background: rgba(0,212,255,0.05);
    border-left: 2px solid var(--accent);
    padding: 10px 12px;
    border-radius: 6px;
  }
  .review-header {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 0;
  }

  /* ── Learn Screen ── */
  .learn-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .learn-back {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: border-color 0.2s;
  }
  .learn-back:hover { border-color: var(--accent); }

  .lesson-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .lesson-section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 2px;
  }
  .lesson-body {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
  }
  .lesson-body strong { color: var(--accent); }
  .lesson-body p { margin-bottom: 10px; }
  .lesson-body p:last-child { margin-bottom: 0; }

  .lesson-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    margin-top: 6px;
  }
  .lesson-table th {
    background: rgba(0,212,255,0.1);
    color: var(--accent);
    padding: 8px 10px;
    text-align: left;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  .lesson-table td {
    padding: 8px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--text);
    vertical-align: top;
  }
  .lesson-table tr:last-child td { border-bottom: none; }
  .lesson-table tr:hover td { background: rgba(255,255,255,0.02); }

  .lesson-tip {
    background: rgba(255,204,0,0.07);
    border: 1px solid rgba(255,204,0,0.25);
    border-left: 3px solid var(--yellow);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--text);
  }
  .lesson-tip strong { color: var(--yellow); }

  .lesson-diagram {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .layer-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.82rem;
  }
  .layer-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.75rem;
    flex-shrink: 0;
  }
  .layer-name { font-weight: 700; min-width: 100px; }
  .layer-link {
    font-weight: 700;
    min-width: 100px;
    text-decoration: underline;
    text-decoration-style: dotted;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .layer-link:hover { opacity: 0.75; }
  .layer-row { cursor: pointer; transition: filter 0.15s; }
  .layer-row:hover { filter: brightness(1.15); }
  .layer-detail { color: var(--muted); font-size: 0.78rem; }

  .topic-card .card-btns {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: center;
  }
  .btn-learn, .btn-quiz-sm {
    flex: 1;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s;
  }
  .btn-learn {
    background: rgba(0,212,255,0.12);
    color: var(--accent);
    border: 1px solid rgba(0,212,255,0.3);
  }
  .btn-learn:hover { background: rgba(0,212,255,0.22); }
  .btn-quiz-sm {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #000;
  }
  .btn-quiz-sm:hover { opacity: 0.85; }

  .btn-start-quiz {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #000;
    font-weight: 700;
    font-size: 1rem;
    border: none;
    border-radius: 10px;
    padding: 16px 24px;
    cursor: pointer;
    transition: opacity 0.2s;
    width: 100%;
  }
  .btn-start-quiz:hover { opacity: 0.85; }

  /* ── Visual Diagram Elements ── */
  .pkt-header {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin: 10px 0;
    font-size: 0.72rem;
  }
  .pkt-field {
    padding: 7px 6px;
    border-radius: 5px;
    text-align: center;
    font-weight: 700;
    line-height: 1.2;
    color: #000;
  }
  .pkt-label {
    font-size: 0.68rem;
    color: var(--muted);
    text-align: center;
    margin-top: 2px;
  }

  .flow-diagram {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin: 10px 0;
    justify-content: center;
  }
  .flow-node {
    padding: 8px 12px;
    border-radius: 8px;
    text-align: center;
    font-size: 0.78rem;
    font-weight: 600;
    border: 1px solid var(--border);
    background: var(--panel);
    min-width: 70px;
  }
  .flow-arrow {
    color: var(--accent);
    font-size: 1.1rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .state-chain {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin: 10px 0;
    align-items: center;
  }
  .state-box {
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 700;
    text-align: center;
    color: #000;
  }
  .state-arrow { color: var(--muted); font-size: 0.9rem; }

  .bar-chart { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-label { font-size: 0.75rem; font-weight: 600; min-width: 70px; color: var(--text); }
  .bar-track { flex: 1; background: var(--border); border-radius: 99px; height: 14px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 0.65rem; font-weight: 700; color: #000; transition: width 0.6s ease; }
  .bar-val { font-size: 0.72rem; color: var(--muted); min-width: 40px; }

  .topo-diagram {
    display: grid;
    gap: 6px;
    margin: 10px 0;
    font-size: 0.75rem;
  }
  .topo-node {
    padding: 8px 10px;
    border-radius: 8px;
    text-align: center;
    font-weight: 700;
    border: 2px solid;
  }
  .topo-link {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.7rem;
    gap: 4px;
  }
  .as-box {
    border: 2px dashed;
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .as-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  /* ── Subnet Animation ── */
  .subnet-anim {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
  }
  .sa-row-label {
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 6px;
    margin-bottom: 2px;
  }
  .sa-bits { display: flex; gap: 2px; flex-wrap: nowrap; }
  .sa-octet { display: flex; gap: 2px; }
  .sa-dot {
    width: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 700;
  }
  .sa-bit {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.72rem;
    transition: opacity 0.3s, transform 0.3s, background 0.3s, border-color 0.3s, box-shadow 0.3s;
  }
  .sa-decimal-row { display: flex; gap: 2px; align-items: center; }
  .sa-dec-val {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.62rem;
    border-radius: 4px;
    transition: opacity 0.4s, background 0.3s;
  }
  .sa-dec-dot { width: 6px; text-align: center; color: var(--muted); font-size: 0.8rem; }
  .sa-operator {
    text-align: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--yellow);
    padding: 4px 0;
    letter-spacing: 2px;
    transition: opacity 0.5s;
  }
  .sa-divider {
    height: 2px;
    background: linear-gradient(90deg, #00d4ff, #cc66ff, #00ff88);
    border-radius: 99px;
    margin: 4px 0;
    transition: opacity 0.5s;
  }
  .sa-result-label {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--green);
    text-align: center;
    padding: 8px;
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 8px;
    transition: opacity 0.6s;
    margin-top: 4px;
  }
  .sa-legend {
    display: flex;
    gap: 12px;
    justify-content: center;
    font-size: 0.7rem;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .sa-legend-item { display: flex; align-items: center; gap: 5px; color: var(--muted); }
  .sa-legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  .sa-controls {

  xpThresholds: [0,100,250,450,700,1000,1400,1900,2500,3200],
};

function loadState() {
  const s = localStorage.getItem('netquest_state');
  if (s) {
    const saved = JSON.parse(s);
    Object.assign(state, saved);
  }
}

function saveState() {
  localStorage.setItem('netquest_state', JSON.stringify({
    xp: state.xp,
    level: state.level,
    streak: state.streak,
    topicScores: state.topicScores,
  }));
}

// ── UI Helpers ───────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toast(msg, duration = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function updateHUD() {
  document.getElementById('hud-level').textContent = state.level;
  document.getElementById('hud-xp').textContent = state.xp;
  document.getElementById('hud-streak').textContent = state.streak + '🔥';

  const currentThreshold = state.xpThresholds[state.level - 1] || 0;
  const nextThreshold = state.xpThresholds[state.level] || (currentThreshold + 500);
  const progress = ((state.xp - currentThreshold) / (nextThreshold - currentThreshold)) * 100;

  document.getElementById('xp-fill').style.width = Math.min(100, Math.max(0, progress)) + '%';
  document.getElementById('xp-label-left').textContent = 'Level ' + state.level;
  document.getElementById('xp-label-right').textContent = state.xp + ' / ' + nextThreshold + ' XP';
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderLayerLesson(layerNum) {
  const lesson = LAYER_LESSONS[layerNum];
  document.getElementById('layer-detail-title').textContent = 'Layer ' + lesson.num;
  const container = document.getElementById('layer-detail-content');
  container.innerHTML = '';

  // Layer banner
  const banner = document.createElement('div');
  banner.style.cssText = `background:${lesson.color}18;border:1px solid ${lesson.color}44;border-left:4px solid ${lesson.color};border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:4px;`;
  banner.innerHTML = `<div style="width:44px;height:44px;border-radius:50%;background:${lesson.color};color:#000;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;flex-shrink:0">${lesson.num}</div>
    <div><div style="font-size:1.15rem;font-weight:700;color:${lesson.color}">${lesson.name}</div>
    <div style="font-size:0.8rem;color:var(--muted)">OSI Layer ${lesson.num}</div></div>`;
  container.appendChild(banner);

  for (const section of lesson.sections) {
    const card = document.createElement('div');
    card.className = 'lesson-card';

    if (section.type === 'l3protocol_table') {
      const rows = section.rows.map(r =>
        `<tr><td><a class="proto-link review-link" data-l3proto="${r[0]}" style="cursor:pointer">${r[0]}</a></td>${r.slice(1).map(c=>`<td>${c}</td>`).join('')}</tr>`
      ).join('');
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div style="font-size:0.75rem;color:var(--muted);margin-bottom:6px;">Tap a protocol to learn more →</div>
        <table class="lesson-table">
          <thead><tr>${section.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      card.querySelectorAll('[data-l3proto]').forEach(link => {
        link.addEventListener('click', () => renderL3ProtocolLesson(link.dataset.l3proto));
      });
    } else if (section.type === 'protocol_table') {
      const rows = section.rows.map(r =>
        `<tr><td><a class="proto-link review-link" data-proto="${r[0]}" style="cursor:pointer">${r[0]}</a></td>${r.slice(1).map(c=>`<td>${c}</td>`).join('')}</tr>`
      ).join('');
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div style="font-size:0.75rem;color:var(--muted);margin-bottom:6px;">Tap a protocol to learn more →</div>
        <table class="lesson-table">
          <thead><tr>${section.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      card.querySelectorAll('.proto-link').forEach(link => {
        link.addEventListener('click', () => renderProtocolLesson(link.dataset.proto));
      });
    } else if (section.type === 'arp_anim') {
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div id="arp-anim-root"></div>`;
      container.appendChild(card);
      buildARPAnim(document.getElementById('arp-anim-root'));
      continue;
    } else if (section.type === 'hub_switch_anim') {
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div id="hs-anim-root"></div>`;
      container.appendChild(card);
      buildHubSwitchAnim(document.getElementById('hs-anim-root'));
      continue;
    } else if (section.type === 'frame_anim') {
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div id="frame-anim-root"></div>`;
      container.appendChild(card);
      buildFrameAnim(document.getElementById('frame-anim-root'));
      continue;
    } else if (section.type === 'cable_anim') {
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div id="cable-anim-root"></div>`;
      container.appendChild(card);
      buildCableAnim(document.getElementById('cable-anim-root'));
      continue;
    } else if (section.type === 'subnet_anim') {
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div class="lesson-body">${section.body}</div>
        <div id="subnet-anim-root"></div>`;
      container.appendChild(card);
      buildSubnetAnim(document.getElementById('subnet-anim-root'));
      continue;
    } else if (section.type === 'table') {
      const rows = section.rows.map(r => '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>').join('');
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <table class="lesson-table">
          <thead><tr>${section.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    } else if (section.type === 'tip') {
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div class="lesson-tip">💡 ${section.body}</div>`;
    } else if (section.type === 'body_then_table') {
      const rows = section.rows.map(r => '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>').join('');
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div class="lesson-body">${section.body}</div>
        <table class="lesson-table" style="margin-top:10px">
          <thead><tr>${section.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    } else {
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div class="lesson-body">${section.body}</div>`;
    }
    container.appendChild(card);
  }

  showScreen('screen-layer');
  window.scrollTo(0, 0);
}

// ── DORA Animation ───────────────────────────────────────────────────────────
function buildDORAnim(root) {
  const LETTERS = [
    { key:'D', name:'Discover', color:'#ff9900' },
    { key:'O', name:'Offer',    color:'#7b4fff' },
    { key:'R', name:'Request',  color:'#00d4ff' },
    { key:'A', name:'Ack',      color:'#00ff88' },
  ];

  const STEPS = [
    {
      letter:-1,
      text:'A new device connects to the network with <strong>no IP address</strong>. It needs one automatically — but it doesn\'t even know the DHCP server\'s address yet. Enter DORA.',
      pkt:null, clientIp:'No IP', serverNote:'Pool: .50–.100', bcast:null, detail:null
    },
    {
      letter:0,
      text:'<strong style="color:#ff9900">D — DISCOVER</strong> · Client broadcasts to the entire network: <em>"Is there a DHCP server? I need an IP!"</em> Source is <code>0.0.0.0</code> (no IP yet), destination is <code>255.255.255.255</code> (all devices).',
      pkt:{dir:'right',label:'DISCOVER',color:'#ff9900'},
      clientIp:'0.0.0.0', serverNote:'Pool: .50–.100',
      bcast:{text:'255.255.255.255 — Broadcast',color:'#ff9900'},
      detail:{from:'0.0.0.0',to:'255.255.255.255',proto:'UDP 68 → 67',msg:'Who is the DHCP server?'}
    },
    {
      letter:1,
      text:'<strong style="color:#7b4fff">O — OFFER</strong> · DHCP server picks an available IP from its pool and responds: <em>"You can have 192.168.1.50 — along with your gateway and DNS!"</em>',
      pkt:{dir:'left',label:'OFFER',color:'#7b4fff'},
      clientIp:'← offer: 192.168.1.50', serverNote:'Reserved: .50',
      bcast:null,
      detail:{from:'192.168.1.1',to:'255.255.255.255',proto:'UDP 67 → 68',msg:'Offering 192.168.1.50 | GW: .1 | DNS: 8.8.8.8 | Lease: 24h'}
    },
    {
      letter:2,
      text:'<strong style="color:#00d4ff">R — REQUEST</strong> · Client broadcasts acceptance: <em>"I\'ll take 192.168.1.50!"</em> Still broadcast so <strong>all DHCP servers</strong> see which offer was accepted — others withdraw theirs.',
      pkt:{dir:'right',label:'REQUEST',color:'#00d4ff'},
      clientIp:'requesting: .50', serverNote:'Waiting...',
      bcast:{text:'255.255.255.255 — Broadcast',color:'#00d4ff'},
      detail:{from:'0.0.0.0',to:'255.255.255.255',proto:'UDP 68 → 67',msg:'Requesting 192.168.1.50 from server 192.168.1.1'}
    },
    {
      letter:3,
      text:'<strong style="color:#00ff88">A — ACKNOWLEDGE</strong> · Server confirms the lease: <em>"192.168.1.50 is yours for 24 hours!"</em> Client now officially has a fully configured IP.',
      pkt:{dir:'left',label:'ACK ✓',color:'#00ff88'},
      clientIp:'192.168.1.50 ✓', serverNote:'Leased: .50',
      bcast:null,
      detail:{from:'192.168.1.1',to:'192.168.1.50',proto:'UDP 67 → 68',msg:'Confirmed! IP: .50 | Mask: /24 | GW: .1 | DNS: 8.8.8.8 | Lease: 24h'}
    },
    {
      letter:4,
      text:'<strong style="color:#00ff88">✅ DORA complete!</strong> The client has a full IP config in under a second — all automatic. When the lease expires, DORA runs again (usually just R→A to renew).',
      pkt:null, clientIp:'192.168.1.50', serverNote:'Leased: .50',
      bcast:null, detail:null, summary:true
    },
  ];

  let step=0, autoTimer=null;

  root.innerHTML = `<div class="dora-wrap">
    <div class="dora-letters">
      ${LETTERS.map((l,i)=>`<div class="dora-letter" id="dora-L${i}" style="--dc:${l.color}">
        <div class="dora-letter-key" style="color:${l.color}">${l.key}</div>
        <div class="dora-letter-name">${l.name}</div>
      </div>`).join('')}
    </div>
    <div class="dora-topo" id="dora-topo">
      <div class="dora-node" id="dora-client">
        <div class="dora-node-box" id="dora-cbox">💻</div>
        <div class="dora-node-name">Client</div>
        <div class="dora-node-ip" id="dora-cip">No IP</div>
      </div>
      <div class="dora-wire-track"></div>
      <div class="dora-node" id="dora-server">
        <div class="dora-node-box" id="dora-sbox">🖧</div>
        <div class="dora-node-name">DHCP Server</div>
        <div class="dora-node-ip" id="dora-snote">192.168.1.1</div>
      </div>
      <div class="dora-pkt" id="dora-pkt" style="display:none;transition:left 0.55s ease,opacity 0.3s ease;"></div>
      <div class="dora-bcast-badge" id="dora-bcast" style="display:none"></div>
    </div>
    <div id="dora-detail-wrap"></div>
    <div class="dora-step-box" id="dora-step-box"></div>
    <div class="dora-controls">
      <button class="dora-btn" id="dora-prev">◀ Prev</button>
      <span id="dora-step-num" style="color:rgba(255,255,255,0.4);font-size:0.8rem"></span>
      <button class="dora-btn" id="dora-next">Next ▶</button>
      <button class="dora-btn dora-btn-auto" id="dora-auto">▶ Auto Play</button>
      <button class="dora-btn" id="dora-reset">↺ Reset</button>
    </div>
  </div>`;

  function nodeCenter(id) {
    const topoR = root.querySelector('#dora-topo').getBoundingClientRect();
    const box = root.querySelector('#'+id+' .dora-node-box').getBoundingClientRect();
    return { x: box.left+box.width/2-topoR.left, y: box.top+box.height/2-topoR.top };
  }

  function animPkt(fx, tx, y, label, color) {
    const el = root.querySelector('#dora-pkt');
    el.style.transition='none'; el.style.display='flex'; el.style.opacity='1';
    el.style.left=(fx-22)+'px'; el.style.top=y+'px';
    el.style.background=color+'28'; el.style.borderColor=color; el.style.color=color;
    el.textContent=label;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      el.style.transition='left 0.55s ease, opacity 0.3s ease';
      el.style.left=(tx-22)+'px';
    }));
  }

  function render() {
    const s = STEPS[step];

    // Letter highlights
    LETTERS.forEach((_,i)=>{
      const el=root.querySelector('#dora-L'+i);
      el.classList.remove('dora-active','dora-done');
      if(s.summary) { el.classList.add('dora-active'); }
      else if(s.letter===i) { el.classList.add('dora-active'); }
      else if(i<s.letter) { el.classList.add('dora-done'); }
    });

    // IP labels
    const cipEl=root.querySelector('#dora-cip');
    cipEl.textContent=s.clientIp;
    cipEl.style.color=s.clientIp.includes('✓')?'#00ff88':s.clientIp.includes('←')||s.clientIp.includes('requesting')?'#ff9900':'rgba(255,255,255,0.4)';
    root.querySelector('#dora-snote').textContent=s.serverNote;

    // Broadcast badge
    const bEl=root.querySelector('#dora-bcast');
    if(s.bcast){
      bEl.textContent='📡 '+s.bcast.text;
      bEl.style.cssText=`display:block;position:absolute;top:7px;left:50%;transform:translateX(-50%);font-size:0.59rem;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;background:${s.bcast.color}18;border:1px solid ${s.bcast.color}44;color:${s.bcast.color};`;
    } else { bEl.style.display='none'; }

    // Detail panel
    const dw=root.querySelector('#dora-detail-wrap');
    if(s.detail){
      const c=LETTERS[s.letter]?.color||'#fff';
      dw.innerHTML=`<div class="dora-detail">
        <div class="dora-msg-row"><span class="dora-msg-label">From</span><span style="font-family:'Courier New',monospace;font-size:0.74rem;color:#e0e0e0">${s.detail.from}</span></div>
        <div class="dora-msg-row"><span class="dora-msg-label">To</span><span style="font-family:'Courier New',monospace;font-size:0.74rem;color:#e0e0e0">${s.detail.to}</span></div>
        <div class="dora-msg-row"><span class="dora-msg-label">Port</span><span style="font-size:0.74rem;color:rgba(255,255,255,0.6)">${s.detail.proto}</span></div>
        <div class="dora-msg-row"><span class="dora-msg-label">Data</span><span style="font-size:0.74rem;color:${c}">${s.detail.msg}</span></div>
      </div>`;
    } else if(s.summary){
      dw.innerHTML=`<div class="dora-detail">${LETTERS.map((l,i)=>`<div class="dora-msg-row">
        <span style="color:${l.color};font-weight:800;width:18px;flex-shrink:0">${l.key}</span>
        <span style="color:${l.color};font-weight:600;width:68px;flex-shrink:0;font-size:0.74rem">${l.name}</span>
        <span style="font-size:0.74rem;color:rgba(255,255,255,0.65)">${['Client→ALL: "Need an IP!"  (src 0.0.0.0, dst 255.255.255.255)','Server→Client: "Take 192.168.1.50" (unicast)','Client→ALL: "I request .50" (broadcast)','Server→Client: "Confirmed! 24h lease" (unicast)'][i]}</span>
      </div>`).join('')}</div>`;
    } else { dw.innerHTML=''; }

    // Step text + counter
    root.querySelector('#dora-step-box').innerHTML=s.text;
    root.querySelector('#dora-step-num').textContent=`Step ${step+1} / ${STEPS.length}`;

    // Animate packet
    root.querySelector('#dora-pkt').style.display='none';
    if(s.pkt){
      const cl=nodeCenter('dora-client'), sv=nodeCenter('dora-server');
      const fx=s.pkt.dir==='right'?cl.x:sv.x, tx=s.pkt.dir==='right'?sv.x:cl.x;
      animPkt(fx,tx,cl.y-11,s.pkt.label,s.pkt.color);
    }

    // Node box colors
    const ac=s.letter>=0&&s.letter<4?LETTERS[s.letter].color:(s.summary?'#00ff88':'rgba(255,255,255,0.2)');
    root.querySelector('#dora-cbox').style.borderColor=ac;
    root.querySelector('#dora-cbox').style.boxShadow=s.letter>=0||s.summary?`0 0 12px ${ac}55`:'none';
    root.querySelector('#dora-sbox').style.borderColor=ac;
    root.querySelector('#dora-sbox').style.boxShadow=s.letter>=0||s.summary?`0 0 12px ${ac}55`:'none';

    root.querySelector('#dora-prev').disabled=step===0;
    root.querySelector('#dora-next').disabled=step===STEPS.length-1;
  }

  root.querySelector('#dora-prev').addEventListener('click',()=>{step=Math.max(0,step-1);render();});
  root.querySelector('#dora-next').addEventListener('click',()=>{step=Math.min(STEPS.length-1,step+1);render();});
  root.querySelector('#dora-reset').addEventListener('click',()=>{step=0;stopAuto();render();});
  root.querySelector('#dora-auto').addEventListener('click',()=>{
    if(autoTimer){stopAuto();return;}
    root.querySelector('#dora-auto').textContent='⏸ Pause';
    autoTimer=setInterval(()=>{if(step<STEPS.length-1){step++;render();}else stopAuto();},2500);
  });

  function stopAuto(){
    clearInterval(autoTimer);autoTimer=null;
    const btn=root.querySelector('#dora-auto');
    if(btn)btn.textContent='▶ Auto Play';
  }

  requestAnimationFrame(()=>render());
}

// ── TCP vs UDP Animation ──────────────────────────────────────────────────────
function buildTCPUDPAnim(root) {
  const TC = '#00d4ff', UC = '#00ff88';

  const SCENARIOS = {
    tcp: {
      color: TC, label: 'TCP', icon: '🔒', sublabel: 'Reliable · Connection-oriented · Ordered',
      steps: [
        { text: '<strong style="color:#00d4ff">TCP</strong> requires a <strong>3-way handshake</strong> before any data is sent. Both sides agree on sequence numbers and confirm readiness — reliability has a cost.', pkt:null },
        { text: '① <strong style="color:#00d4ff">SYN</strong> — Client: <em>"I want to connect, my sequence starts at 100"</em>', pkt:{dir:'right',label:'SYN',color:TC} },
        { text: '② <strong style="color:#7b4fff">SYN-ACK</strong> — Server: <em>"Got it! My sequence starts at 200, acknowledging yours."</em>', pkt:{dir:'left',label:'SYN-ACK',color:'#7b4fff'} },
        { text: '③ <strong style="color:#00d4ff">ACK</strong> — Client: <em>"Got yours!"</em> — <strong>Connection established.</strong>', pkt:{dir:'right',label:'ACK',color:TC}, badge:'🔒 Connected' },
        { text: 'Data flows: Client sends <strong>Segment 1</strong>. Server immediately sends back an <strong>ACK</strong> — "received, send more!"', pkt:{dir:'right',label:'DATA 1',color:'#00ff88'}, ackPkt:{dir:'left',label:'ACK ✓',color:TC}, badge:'🔒 Connected' },
        { text: '<strong style="color:#ff4466">Segment 2 is LOST</strong> — dropped by a congested router. Server never receives it. Timer starts...', pkt:{dir:'right',label:'DATA 2',color:'#ff4466',lost:true}, badge:'🔒 Connected' },
        { text: '<strong style="color:#ff9900">Timeout! No ACK received.</strong> TCP automatically <strong>retransmits Segment 2.</strong>', pkt:{dir:'right',label:'RETX 2',color:'#ff9900'}, ackPkt:{dir:'left',label:'ACK ✓',color:TC}, badge:'🔒 Connected' },
        { text: '<strong style="color:#00ff88">✅ All data delivered in order!</strong> TCP guarantees every byte arrives — at the cost of handshakes, ACKs, and retransmits.', pkt:null, badge:'✅ Reliable delivery' },
      ]
    },
    udp: {
      color: UC, label: 'UDP', icon: '⚡', sublabel: 'Fast · Connectionless · Best-effort',
      steps: [
        { text: '<strong style="color:#00ff88">UDP</strong> sends data immediately — <strong>no handshake</strong>, no ACKs, no retransmits. Pure speed.', pkt:null },
        { text: '<strong style="color:#00ff88">Datagram 1</strong> — fires instantly. No setup needed!', pkt:{dir:'right',label:'DATA 1',color:UC} },
        { text: '<strong style="color:#00ff88">Datagram 2</strong> — fires. Server receives silently. No ACK sent back.', pkt:{dir:'right',label:'DATA 2',color:UC} },
        { text: '<strong style="color:#ff4466">Datagram 3 — DROPPED!</strong> Lost in the network. Nobody notices — no ACK expected.', pkt:{dir:'right',label:'DATA 3',color:'#ff4466',lost:true} },
        { text: '<strong style="color:#00ff88">Datagram 4</strong> — fires anyway. UDP never retransmits. It just keeps going.', pkt:{dir:'right',label:'DATA 4',color:UC} },
        { text: '<strong>3 of 4 delivered. No guarantee — but blazing fast.</strong><br>Best for: 🎬 video streaming &nbsp;·&nbsp; 🔊 VoIP &nbsp;·&nbsp; 🌐 DNS queries &nbsp;·&nbsp; 🎮 gaming', pkt:null, badge:'⚡ 3/4 delivered (best-effort)' },
      ]
    }
  };

  let mode = 'tcp', step = 0, autoTimer = null;

  root.innerHTML = `<div class="tcpu-wrap">
    <div class="tcpu-tabs">
      <button class="tcpu-tab" id="tcpu-tab-tcp">🔒 TCP — Reliable</button>
      <button class="tcpu-tab" id="tcpu-tab-udp">⚡ UDP — Fast</button>
    </div>
    <div class="tcpu-topo" id="tcpu-topo">
      <div class="tcpu-node" id="tcpu-client">
        <div class="tcpu-node-box" id="tcpu-cbox">💻</div>
        <div class="tcpu-node-name">Client</div>
      </div>
      <div class="tcpu-wire-track"></div>
      <div class="tcpu-node" id="tcpu-server">
        <div class="tcpu-node-box" id="tcpu-sbox">🖥️</div>
        <div class="tcpu-node-name">Server</div>
      </div>
      <div class="tcpu-pkt" id="tcpu-pkt" style="display:none;transition:left 0.55s ease,opacity 0.3s ease;"></div>
      <div class="tcpu-pkt" id="tcpu-apkt" style="display:none;transition:left 0.55s ease,opacity 0.3s ease;"></div>
      <div class="tcpu-conn-badge" id="tcpu-badge" style="display:none"></div>
    </div>
    <div class="tcpu-desc">
      <div class="tcpu-mode-lbl" id="tcpu-mode-lbl"></div>
      <div id="tcpu-desc-text"></div>
    </div>
    <div class="tcpu-controls">
      <button class="tcpu-btn" id="tcpu-prev">◀ Prev</button>
      <span id="tcpu-step-num" style="color:rgba(255,255,255,0.4);font-size:0.8rem"></span>
      <button class="tcpu-btn" id="tcpu-next">Next ▶</button>
      <button class="tcpu-btn tcpu-btn-auto" id="tcpu-auto">▶ Auto Play</button>
      <button class="tcpu-btn" id="tcpu-reset">↺ Reset</button>
    </div>
  </div>`;

  function nodeCenter(id) {
    const topoR = root.querySelector('#tcpu-topo').getBoundingClientRect();
    const box = root.querySelector('#' + id + ' .tcpu-node-box').getBoundingClientRect();
    return { x: box.left + box.width/2 - topoR.left, y: box.top + box.height/2 - topoR.top };
  }

  function animPkt(el, fx, tx, y, label, color, lost, cb) {
    el.style.transition = 'none';
    el.style.display = 'flex';
    el.style.opacity = '1';
    el.style.left = (fx - 20) + 'px';
    el.style.top = y + 'px';
    el.style.background = color + '28';
    el.style.borderColor = color;
    el.style.color = color;
    el.textContent = label;
    const destX = lost ? (fx + tx) / 2 : tx;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transition = 'left 0.55s ease, opacity 0.3s ease';
      el.style.left = (destX - 20) + 'px';
      if (lost) {
        setTimeout(() => { el.style.opacity='0'; setTimeout(() => { el.style.display='none'; cb&&cb(); }, 300); }, 560);
      } else {
        setTimeout(() => { cb&&cb(); }, 600);
      }
    }));
  }

  function render() {
    const sc = SCENARIOS[mode];
    const s = sc.steps[step];

    // Tab styles
    ['tcp','udp'].forEach(m => {
      const c = m === 'tcp' ? TC : UC;
      const btn = root.querySelector('#tcpu-tab-' + m);
      if (mode === m) {
        btn.style.cssText = `color:${c};border:1px solid ${c};background:${c}18;`;
      } else {
        btn.style.cssText = 'color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);';
      }
    });

    root.querySelector('#tcpu-mode-lbl').innerHTML = `<span style="color:${sc.color}">${sc.icon} ${sc.label}</span> <span style="color:rgba(255,255,255,0.35);font-weight:400;font-size:0.62rem">— ${sc.sublabel}</span>`;
    root.querySelector('#tcpu-desc-text').innerHTML = s.text;
    root.querySelector('#tcpu-step-num').textContent = `Step ${step+1} / ${sc.steps.length}`;

    // Node box border
    root.querySelector('#tcpu-cbox').style.borderColor = sc.color;
    root.querySelector('#tcpu-cbox').style.boxShadow = `0 0 10px ${sc.color}55`;
    root.querySelector('#tcpu-sbox').style.borderColor = sc.color;
    root.querySelector('#tcpu-sbox').style.boxShadow = `0 0 10px ${sc.color}55`;

    // Badge
    const badge = root.querySelector('#tcpu-badge');
    if (s.badge) {
      badge.style.display = 'block';
      badge.textContent = s.badge;
      const bc = s.badge.includes('✅') ? '#00ff88' : s.badge.includes('⚡') ? '#ff9900' : '#00d4ff';
      badge.style.cssText = `display:block;position:absolute;top:7px;left:50%;transform:translateX(-50%);font-size:0.63rem;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap;background:${bc}18;border:1px solid ${bc}44;color:${bc};`;
    } else {
      badge.style.display = 'none';
    }

    // Packets
    root.querySelector('#tcpu-pkt').style.display = 'none';
    root.querySelector('#tcpu-apkt').style.display = 'none';

    if (s.pkt) {
      const cl = nodeCenter('tcpu-client');
      const sv = nodeCenter('tcpu-server');
      const fx = s.pkt.dir === 'right' ? cl.x : sv.x;
      const tx = s.pkt.dir === 'right' ? sv.x : cl.x;
      const y = cl.y - 11;
      animPkt(root.querySelector('#tcpu-pkt'), fx, tx, y, s.pkt.label, s.pkt.color, !!s.pkt.lost,
        s.ackPkt ? () => {
          const af = s.ackPkt.dir === 'right' ? cl.x : sv.x;
          const at = s.ackPkt.dir === 'right' ? sv.x : cl.x;
          animPkt(root.querySelector('#tcpu-apkt'), af, at, y + 26, s.ackPkt.label, s.ackPkt.color, false, null);
        } : null
      );
    }

    root.querySelector('#tcpu-prev').disabled = step === 0;
    root.querySelector('#tcpu-next').disabled = step === sc.steps.length - 1;
  }

  function loadMode(m) { mode=m; step=0; stopAuto(); render(); }

  root.querySelector('#tcpu-tab-tcp').addEventListener('click', () => loadMode('tcp'));
  root.querySelector('#tcpu-tab-udp').addEventListener('click', () => loadMode('udp'));
  root.querySelector('#tcpu-prev').addEventListener('click', () => { step=Math.max(0,step-1); render(); });
  root.querySelector('#tcpu-next').addEventListener('click', () => { step=Math.min(SCENARIOS[mode].steps.length-1,step+1); render(); });
  root.querySelector('#tcpu-reset').addEventListener('click', () => { step=0; stopAuto(); render(); });
  root.querySelector('#tcpu-auto').addEventListener('click', () => {
    if (autoTimer) { stopAuto(); return; }
    root.querySelector('#tcpu-auto').textContent = '⏸ Pause';
    autoTimer = setInterval(() => {
      if (step < SCENARIOS[mode].steps.length-1) { step++; render(); } else stopAuto();
    }, 2200);
  });

  function stopAuto() {
    clearInterval(autoTimer); autoTimer=null;
    const btn = root.querySelector('#tcpu-auto');
    if (btn) btn.textContent = '▶ Auto Play';
  }

  requestAnimationFrame(() => render());
}

// ── STP Animation ────────────────────────────────────────────────────────────
function buildSTPAnim(root) {
  const SW_PCT = { 1:[50,16], 2:[16,62], 3:[84,62], 4:[50,87] };

  const STEPS = [
    {
      phase:'problem', phaseLabel:'⚠️ The Problem',
      text:'Four switches are connected in a ring — SW1↔SW2↔SW4↔SW3↔SW1. Every switch has two paths to every other switch. This looks like great redundancy, but it creates a dangerous <strong>Layer 2 loop</strong>.',
      blockLink:false, showRoot:false, hiSw:[], looping:false, showPorts:{}, showBids:false
    },
    {
      phase:'problem', phaseLabel:'⚠️ Broadcast Storm!',
      text:'A single broadcast frame enters SW1. It gets forwarded out <em>every</em> port. SW2 and SW3 each receive it and forward it again — and again — forever. This <strong style="color:#ff4466">broadcast storm</strong> consumes all bandwidth and crashes the network!',
      blockLink:false, showRoot:false, hiSw:[], looping:true, showPorts:{}, showBids:false
    },
    {
      phase:'stp', phaseLabel:'✅ STP: Bridge ID Election',
      text:'STP kicks in. Every switch sends <strong>BPDUs</strong> (Bridge Protocol Data Units) containing its <strong>Bridge ID</strong> = Priority + MAC address. The switch with the <strong>lowest Bridge ID wins</strong> the Root Bridge election.',
      blockLink:false, showRoot:false, hiSw:[1,2,3,4], looping:false, showPorts:{}, showBids:true
    },
    {
      phase:'stp', phaseLabel:'✅ Root Bridge Elected',
      text:'<strong style="color:#ff9900">SW1</strong> has the lowest Bridge ID (priority 4096). It becomes the <strong style="color:#ff9900">👑 Root Bridge</strong> — the central reference for the entire spanning tree. All paths are measured relative to SW1.',
      blockLink:false, showRoot:true, hiSw:[1], looping:false, showPorts:{}, showBids:true
    },
    {
      phase:'stp', phaseLabel:'✅ Root Ports Selected',
      text:'Each non-root switch picks its <strong style="color:#00d4ff">Root Port (RP)</strong> — the port with the lowest-cost path to the Root Bridge. SW2 and SW3 connect directly to SW1. SW4\'s best path is via SW2.',
      blockLink:false, showRoot:true, hiSw:[2,3,4], looping:false, showPorts:{rp:true}, showBids:true
    },
    {
      phase:'stp', phaseLabel:'✅ Blocking the Redundant Port',
      text:'STP finds the loop: the SW3↔SW4 link. SW4 already has a better path to Root via SW2. So STP <strong style="color:#ff4466">blocks SW4\'s port toward SW3</strong>. No frames can flow through that port.',
      blockLink:true, showRoot:true, hiSw:[3,4], looping:false, showPorts:{rp:true, blk:true}, showBids:true
    },
    {
      phase:'stp', phaseLabel:'✅ Loop Eliminated!',
      text:'The loop is broken! Traffic flows in a <strong style="color:#00ff88">tree structure</strong> — no loops possible. <strong style="color:#00ff88">All switches are still reachable.</strong> If a forwarding link fails, STP automatically unblocks the blocked port (within 30–50 seconds).',
      blockLink:true, showRoot:true, hiSw:[], looping:false, showPorts:{rp:true, blk:true, fwd:true}, showBids:true
    },
  ];

  let step = 0, autoTimer = null, loopTimer = null, loopStep = 0;

  root.innerHTML = `<div class="stp-wrap">
    <div class="stp-topo" id="stp-topo">
      <svg class="stp-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <line id="stp-L12" x1="50" y1="16" x2="16" y2="62" stroke="rgba(255,255,255,0.25)" stroke-width="0.9"/>
        <line id="stp-L13" x1="50" y1="16" x2="84" y2="62" stroke="rgba(255,255,255,0.25)" stroke-width="0.9"/>
        <line id="stp-L24" x1="16" y1="62" x2="50" y2="87" stroke="rgba(255,255,255,0.25)" stroke-width="0.9"/>
        <line id="stp-L34" x1="84" y1="62" x2="50" y2="87" stroke="rgba(255,255,255,0.25)" stroke-width="0.9"/>
        <g id="stp-blk-x" style="display:none">
          <circle cx="67" cy="74.5" r="4" fill="#0a0e1a" stroke="#ff4466" stroke-width="0.8"/>
          <text x="67" y="76.3" text-anchor="middle" font-size="4.5" fill="#ff4466" font-weight="bold">✕</text>
        </g>
      </svg>
      <div class="stp-sw" id="stp-sw1" style="left:50%;top:16%">
        <div class="stp-crown" id="stp-crown" style="display:none">👑</div>
        <div class="stp-sw-box">🖥️</div>
        <div class="stp-sw-name" style="color:#ff9900">SW1</div>
        <div class="stp-sw-sub" id="stp-bid1">Pri: 4096</div>
      </div>
      <div class="stp-sw" id="stp-sw2" style="left:16%;top:62%">
        <div class="stp-sw-box">🖥️</div>
        <div class="stp-sw-name">SW2</div>
        <div class="stp-sw-sub" id="stp-bid2">Pri: 8192</div>
        <div id="stp-rp2" class="stp-port-badge stp-port-root" style="display:none">RP ↑</div>
      </div>
      <div class="stp-sw" id="stp-sw3" style="left:84%;top:62%">
        <div class="stp-sw-box">🖥️</div>
        <div class="stp-sw-name">SW3</div>
        <div class="stp-sw-sub" id="stp-bid3">Pri: 16384</div>
        <div id="stp-rp3" class="stp-port-badge stp-port-root" style="display:none">RP ↑</div>
      </div>
      <div class="stp-sw" id="stp-sw4" style="left:50%;top:87%">
        <div class="stp-sw-box">🖥️</div>
        <div class="stp-sw-name">SW4</div>
        <div class="stp-sw-sub" id="stp-bid4">Pri: 32768</div>
        <div id="stp-rp4" class="stp-port-badge stp-port-root" style="display:none">RP ←</div>
        <div id="stp-blk4" class="stp-port-badge stp-port-blk" style="display:none">BLK →</div>
      </div>
      <div class="stp-pkt" id="stp-pkt" style="display:none;background:#ff4466;box-shadow:0 0 10px #ff4466;"></div>
    </div>
    <div class="stp-step-box" id="stp-step-box"></div>
    <div class="stp-controls">
      <button class="stp-btn" id="stp-prev">◀ Prev</button>
      <span id="stp-step-num" style="color:rgba(255,255,255,0.4);font-size:0.8rem"></span>
      <button class="stp-btn" id="stp-next">Next ▶</button>
      <button class="stp-btn stp-btn-auto" id="stp-auto">▶ Auto Play</button>
      <button class="stp-btn" id="stp-reset">↺ Reset</button>
    </div>
  </div>`;

  function getPktPx(swId) {
    const topo = root.querySelector('#stp-topo');
    const w = topo.offsetWidth, h = topo.offsetHeight;
    const [px, py] = SW_PCT[swId];
    return { x: w * px / 100, y: h * py / 100 };
  }

  function stopLoop() {
    clearInterval(loopTimer); loopTimer = null; loopStep = 0;
    const pkt = root.querySelector('#stp-pkt');
    if (pkt) pkt.style.display = 'none';
    ['L12','L13','L24','L34'].forEach(id => {
      const el = root.querySelector('#stp-' + id);
      if (el) el.classList.remove('stp-looping');
    });
  }

  function startLoop() {
    const PATH = [1, 2, 4, 3];
    const pkt = root.querySelector('#stp-pkt');
    pkt.style.display = 'block';
    ['L12','L13','L24','L34'].forEach(id => root.querySelector('#stp-'+id).classList.add('stp-looping'));
    function tick() {
      const pos = getPktPx(PATH[loopStep % PATH.length]);
      pkt.style.left = pos.x + 'px';
      pkt.style.top  = pos.y + 'px';
      loopStep = (loopStep + 1) % PATH.length;
    }
    tick();
    loopTimer = setInterval(tick, 550);
  }

  function render() {
    const s = STEPS[step];
    const phaseClass = s.phase === 'problem' ? 'stp-phase-problem' : 'stp-phase-stp';
    root.querySelector('#stp-step-box').innerHTML = `<div class="stp-phase ${phaseClass}">${s.phaseLabel}</div><div>${s.text}</div>`;
    root.querySelector('#stp-step-num').textContent = `Step ${step+1} / ${STEPS.length}`;

    // Switch highlights
    [1,2,3,4].forEach(n => {
      const el = root.querySelector('#stp-sw'+n);
      el.classList.remove('stp-sw-root','stp-sw-hi','stp-sw-dim');
      if (s.showRoot && n===1) el.classList.add('stp-sw-root');
      else if (s.hiSw.includes(n)) el.classList.add('stp-sw-hi');
      else if (s.hiSw.length > 0 && !s.hiSw.includes(n)) el.classList.add('stp-sw-dim');
    });

    root.querySelector('#stp-crown').style.display = s.showRoot ? 'block' : 'none';

    // Bridge ID opacity
    [1,2,3,4].forEach(n => {
      root.querySelector('#stp-bid'+n).style.opacity = s.showBids ? '1' : '0.3';
    });

    // Port badges
    root.querySelector('#stp-rp2').style.display = s.showPorts.rp ? 'inline-block' : 'none';
    root.querySelector('#stp-rp3').style.display = s.showPorts.rp ? 'inline-block' : 'none';
    root.querySelector('#stp-rp4').style.display = s.showPorts.rp ? 'inline-block' : 'none';
    root.querySelector('#stp-blk4').style.display = s.showPorts.blk ? 'inline-block' : 'none';

    // Link colors
    const fwdStroke = s.showPorts.fwd ? '#00ff88' : 'rgba(255,255,255,0.3)';
    const fwdW = s.showPorts.fwd ? '1.3' : '0.9';
    ['L12','L13','L24'].forEach(id => {
      const l = root.querySelector('#stp-'+id);
      l.setAttribute('stroke', fwdStroke);
      l.setAttribute('stroke-width', fwdW);
      l.removeAttribute('stroke-dasharray');
      l.classList.remove('stp-looping');
    });
    const l34 = root.querySelector('#stp-L34');
    if (s.blockLink) {
      l34.setAttribute('stroke', '#ff4466');
      l34.setAttribute('stroke-width', '0.9');
      l34.setAttribute('stroke-dasharray', '2,1.5');
      l34.classList.remove('stp-looping');
    } else {
      l34.setAttribute('stroke', fwdStroke);
      l34.setAttribute('stroke-width', fwdW);
      l34.removeAttribute('stroke-dasharray');
    }
    root.querySelector('#stp-blk-x').style.display = s.blockLink ? 'block' : 'none';

    // Loop packet
    if (s.looping) startLoop(); else stopLoop();

    root.querySelector('#stp-prev').disabled = step === 0;
    root.querySelector('#stp-next').disabled = step === STEPS.length - 1;
  }

  root.querySelector('#stp-prev').addEventListener('click', () => { step = Math.max(0,step-1); render(); });
  root.querySelector('#stp-next').addEventListener('click', () => { step = Math.min(STEPS.length-1,step+1); render(); });
  root.querySelector('#stp-reset').addEventListener('click', () => { step=0; stopAuto(); render(); });
  root.querySelector('#stp-auto').addEventListener('click', () => {
    if (autoTimer) { stopAuto(); return; }
    root.querySelector('#stp-auto').textContent = '⏸ Pause';
    autoTimer = setInterval(() => {
      if (step < STEPS.length-1) { step++; render(); } else stopAuto();
    }, 2800);
  });

  function stopAuto() {
    clearInterval(autoTimer); autoTimer = null;
    const btn = root.querySelector('#stp-auto');
    if (btn) btn.textContent = '▶ Auto Play';
  }

  requestAnimationFrame(() => render());
}

      <button class="wir-btn" id="wir-next">Next ▶</button>

    root.querySelector('#wir-next').disabled = step === STEPS.length - 1;

  root.querySelector('#wir-auto').addEventListener('click', () => {
    if (autoTimer) { stopAuto(); return; }
    root.querySelector('#wir-auto').textContent = '⏸ Pause';
    autoTimer = setInterval(() => {
      if (step < STEPS.length - 1) { step++; render(); } else stopAuto();
    }, 2500);
  });

  function stopAuto() {
    clearInterval(autoTimer); autoTimer = null;
    const btn = root.querySelector('#wir-auto');
    if (btn) btn.textContent = '▶ Auto Play';
  }

  // Initial render after DOM is painted so getBoundingClientRect works
  requestAnimationFrame(() => render());
}

// ── ARP Animation ────────────────────────────────────────────────────────────
function buildARPAnim(root) {
  const PCS = [
    { id:'A', label:'PC-A', ip:'10.0.0.1', mac:'AA:AA', color:'#00d4ff', role:'sender' },
    { id:'B', label:'PC-B', ip:'10.0.0.2', mac:'BB:BB', color:'#00ff88', role:'target' },
    { id:'C', label:'PC-C', ip:'10.0.0.3', mac:'CC:CC', color:'#ff6ec7', role:'bystander' },
  ];
  const REQ='#ffaa44', REP='#00ff88', DATA='#00d4ff';

  const STEPS = [
    { text:`<strong style="color:#00d4ff">PC-A</strong> wants to send data to <strong>10.0.0.2</strong>. Before it can build the Ethernet frame it needs PC-B's <strong>MAC address</strong>. First stop: check the <strong>ARP cache</strong>.`,
      hiPCs:['A'], wires:{}, hiDev:false, cacheMiss:true, cacheHi:null, badges:{}, pkts:{} },
    { text:`<strong>ARP Cache MISS</strong> — no entry for 10.0.0.2. PC-A builds an <strong>ARP Request</strong>:<br><code>Who has 10.0.0.2? Tell 10.0.0.1</code><br>Destination MAC: <code>FF:FF:FF:FF:FF:FF</code> (broadcast — every device must read this).`,
      hiPCs:['A'], wires:{A:'req'}, hiDev:false, cacheMiss:true, cacheHi:null, badges:{}, pkts:{A:{label:'ARP REQ',color:REQ}} },
    { text:`The <strong style="color:#cc66ff">Switch</strong> receives the broadcast on Port 1 and <strong>floods it out all other ports</strong> — PC-B and PC-C both receive a copy.`,
      hiPCs:['B','C'], wires:{B:'req',C:'req'}, hiDev:true, cacheMiss:true, cacheHi:null, badges:{}, pkts:{B:{label:'ARP REQ',color:REQ},C:{label:'ARP REQ',color:REQ}} },
    { text:`<strong style="color:#ff6ec7">PC-C</strong> reads the request — <em>"Is 10.0.0.2 my IP?"</em> No. It <strong>silently discards</strong> it.<br><strong style="color:#00ff88">PC-B</strong> reads it — <em>"Is 10.0.0.2 my IP?"</em> Yes! PC-B sends an <strong>ARP Reply</strong> (unicast) back to AA:AA.`,
      hiPCs:['B'], wires:{B:'rep'}, hiDev:false, cacheMiss:true, cacheHi:null, badges:{C:'🚫',B:'📨'}, pkts:{B:{label:'ARP REP',color:REP}} },
    { text:`The Switch receives PC-B's reply and forwards it <strong>only to Port 1 (PC-A)</strong> — it learned AA:AA's port when the request was sent. No flooding needed for the unicast reply.`,
      hiPCs:['A'], wires:{A:'rep'}, hiDev:true, cacheMiss:true, cacheHi:null, badges:{}, pkts:{A:{label:'ARP REP',color:REP}} },
    { text:`PC-A receives the reply: <em>"10.0.0.2 is at BB:BB."</em> It <strong>adds this to its ARP cache</strong>. The entry stays for ~4 minutes (240 sec on Cisco IOS) before expiring.`,
      hiPCs:['A'], wires:{}, hiDev:false, cacheMiss:false, cacheHi:'B', badges:{A:'✅'}, pkts:{} },
    { text:`<strong>ARP complete!</strong> PC-A now builds the Ethernet frame: <strong>DST MAC = BB:BB</strong>, DST IP = 10.0.0.2 and sends data. Future packets to 10.0.0.2 skip ARP entirely — the cache is used directly.`,
      hiPCs:['A','B'], wires:{A:'data',B:'data'}, hiDev:true, cacheMiss:false, cacheHi:'B', badges:{B:'✅'}, pkts:{A:{label:'DATA',color:DATA},B:{label:'DATA',color:DATA}} },
  ];

  root.innerHTML = `<div class="arp-wrap">
    <div class="arp-cache" id="arp-cache">
      <div class="arp-cache-title">📋 ARP CACHE (PC-A)</div>
      <div id="arp-miss" class="arp-cache-miss" style="display:none">MISS — 10.0.0.2 not found</div>
      <div id="arp-empty" class="arp-cache-empty">Empty</div>
      <div class="arp-cache-row" id="arp-cr-B" style="display:none">
        <span>10.0.0.2</span><span>BB:BB</span><span style="color:#888">Port 2</span>
      </div>
    </div>
    <div class="arp-topo">
      <div class="arp-device" id="arp-dev">
        <span style="font-size:1.3em">🔀</span>
        <span style="font-size:0.65em;font-weight:800;color:#cc66ff;letter-spacing:0.08em">SWITCH</span>
      </div>
      <div class="arp-pc-row">
        ${PCS.map(p=>`<div class="arp-pc-col">
          <div class="arp-wire" id="arp-wire-${p.id}" style="--pc:${p.color}"></div>
          <div class="arp-pc" id="arp-pc-${p.id}" style="--pc:${p.color}">
            <div style="font-size:1.05em">💻</div>
            <div class="arp-pc-lbl">${p.label}</div>
            <div class="arp-pc-ip">${p.ip}</div>
            <div class="arp-pc-mac">${p.mac}</div>
            <div class="arp-pkt-label" id="arp-pkt-${p.id}"></div>
            <div class="arp-badge" id="arp-badge-${p.id}"></div>
          </div>
        </div>`).join('')}
      </div>
    </div>
    <div class="arp-step-box" id="arp-step-box">Press <strong>Next ▶</strong> to watch ARP discover a MAC address.</div>
    <div class="arp-controls">
      <button class="arp-btn" id="arp-prev">◀ Prev</button>
      <span id="arp-ctr">—</span>
      <button class="arp-btn" id="arp-next">Next ▶</button>
      <button class="arp-btn arp-btn-reset" id="arp-reset">↺ Reset</button>
    </div>
  </div>`;

  let step = -1;
  const g = id => root.querySelector('#' + id);

  function applyStep(s) {
    const st = STEPS[s];
    // Reset PCs, wires, badges, pkts
    PCS.forEach(p => {
      g(`arp-pc-${p.id}`).classList.remove('arp-pc-hi','arp-pc-dim');
      const w = g(`arp-wire-${p.id}`);
      w.className = 'arp-wire';
      g(`arp-badge-${p.id}`).textContent = '';
      g(`arp-badge-${p.id}`).classList.remove('arp-badge-on');
      g(`arp-pkt-${p.id}`).textContent = '';
      g(`arp-pkt-${p.id}`).classList.remove('arp-pkt-on');
    });
    // Highlight PCs
    PCS.forEach(p => {
      if (st.hiPCs.length && !st.hiPCs.includes(p.id)) g(`arp-pc-${p.id}`).classList.add('arp-pc-dim');
      if (st.hiPCs.includes(p.id)) g(`arp-pc-${p.id}`).classList.add('arp-pc-hi');
    });
    // Wires
    Object.entries(st.wires).forEach(([id, type]) => {
      g(`arp-wire-${id}`).classList.add(`arp-wire-${type}`);
    });
    // Device
    g('arp-dev').classList.toggle('arp-dev-hi', !!st.hiDev);
    // Badges
    Object.entries(st.badges).forEach(([id, txt]) => {
      g(`arp-badge-${id}`).textContent = txt;
      g(`arp-badge-${id}`).classList.add('arp-badge-on');
    });
    // Packet labels
    Object.entries(st.pkts).forEach(([id, pkt]) => {
      const el = g(`arp-pkt-${id}`);
      el.textContent = pkt.label;
      el.style.background = pkt.color + '22';
      el.style.border = `1px solid ${pkt.color}`;
      el.style.color = pkt.color;
      el.classList.add('arp-pkt-on');
    });
    // ARP cache
    g('arp-miss').style.display = st.cacheMiss ? '' : 'none';
    g('arp-empty').style.display = (st.cacheMiss && !st.cacheHi) ? '' : 'none';
    const cacheRow = g('arp-cr-B');
    if (!st.cacheMiss) {
      cacheRow.style.display = '';
      cacheRow.classList.toggle('arp-cache-hi', st.cacheHi === 'B');
      if (s === 5) cacheRow.classList.add('arp-cache-new');
    } else {
      cacheRow.style.display = 'none';
    }
    g('arp-step-box').innerHTML = st.text;
    g('arp-ctr').textContent = `Step ${s+1} / ${STEPS.length}`;
  }

  function reset() {
    step = -1;
    PCS.forEach(p => {
      g(`arp-pc-${p.id}`).classList.remove('arp-pc-hi','arp-pc-dim');
      g(`arp-wire-${p.id}`).className = 'arp-wire';
      g(`arp-badge-${p.id}`).textContent = '';
      g(`arp-badge-${p.id}`).classList.remove('arp-badge-on');
      g(`arp-pkt-${p.id}`).textContent = '';
      g(`arp-pkt-${p.id}`).classList.remove('arp-pkt-on');
    });
    g('arp-dev').classList.remove('arp-dev-hi');
    g('arp-miss').style.display = 'none';
    g('arp-empty').style.display = '';
    g('arp-cr-B').style.display = 'none';
    g('arp-step-box').innerHTML = 'Press <strong>Next ▶</strong> to watch ARP discover a MAC address.';
    g('arp-ctr').textContent = '—';
  }

  g('arp-next').addEventListener('click', () => { if (step < STEPS.length-1) { step++; applyStep(step); } });
  g('arp-prev').addEventListener('click', () => { if (step > 0) { step--; applyStep(step); } else reset(); });
  g('arp-reset').addEventListener('click', reset);
}
