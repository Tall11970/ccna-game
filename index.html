<p>An "internal" EIGRP route is one that <em>originated within</em> the same EIGRP autonomous system — meaning it was advertised by a router running EIGRP natively, not imported from another protocol. As a result, EIGRP internal routes will always be preferred over OSPF (110) or RIP (120) routes to the same destination.</p>`,

    intro: `<p><strong>OSPF (Open Shortest Path First)</strong> has an Administrative Distance of <strong>110</strong>. It sits just above EIGRP (90) in trust level, reflecting that it's a highly reliable open standard — but not quite as Cisco-optimized as EIGRP.</p>
<p>OSPF is a <strong>link-state protocol</strong>, meaning every router builds a complete map of the network (called the Link State Database, or LSDB) and independently runs <strong>Dijkstra's Shortest Path First (SPF) algorithm</strong> to find the best path to every destination. Because every router has the full picture, OSPF is extremely accurate and scales well across large networks.</p>`,

<p>As a result, a 100 Mbps FastEthernet link has cost=1, and so does a 1 Gbps GigabitEthernet link (100÷1000 rounds to 1). This is a well-known OSPF limitation — you must increase the reference bandwidth with <code>auto-cost reference-bandwidth 1000</code> on all OSPF routers to differentiate GigE from FastEthernet.</p>` },

<p>RIP is a classic <strong>distance-vector protocol</strong>. Rather than building a complete network map like OSPF, RIP routers only know what their neighbors tell them — the classic "routing by rumor" analogy. Each router advertises its routing table to neighbors every <strong>30 seconds</strong>, regardless of whether anything changed. Consequently, RIP is bandwidth-inefficient and slow to converge.</p>`,

function buildADChart(container, highlightKey) {
  const wrap = document.createElement('div');
  wrap.className = 'ad-chart-wrap lesson-card';
  wrap.innerHTML = `<div class="ad-chart-title">Administrative Distance — All Sources (lower = more trusted, click to explore)</div>`;

  AD_SOURCES.forEach((s, idx) => {
    const isActive = s.key === highlightKey;
    const pct = s.ad === 0 ? 0.4 : (s.ad / 255) * 100;
    const row = document.createElement('div');
    row.className = 'ad-bar-row' + (isActive ? ' ad-bar-active' : '');
    row.innerHTML = `
      <div class="ad-bar-label" style="color:${isActive ? s.color : 'var(--muted)'}">${s.label}</div>
      <div class="ad-bar-track">
        <div class="ad-bar-fill" id="adfill-${s.key}" style="background:${s.color};opacity:${isActive?'1':'0.35'}${isActive?';box-shadow:0 0 8px '+s.color+'77':''}"></div>
      </div>
      <div class="ad-bar-val" style="color:${s.color}">${s.ad}</div>`;
    row.addEventListener('click', () => renderADLesson(s.key));
    wrap.appendChild(row);
    setTimeout(() => {
      const fill = document.getElementById('adfill-'+s.key);
      if (fill) { fill.style.width = pct + '%'; }
    }, 80 + idx * 110);
  });

  const scale = document.createElement('div');
  scale.className = 'ad-trust-scale';
  scale.innerHTML = `<span style="color:#00ff88">◀ Most Trusted (0)</span><span>Least Trusted (255) ▶</span>`;
  wrap.appendChild(scale);
  container.appendChild(wrap);
}

    const color = '#ff6ec7';
    card.innerHTML = `<div class="lesson-section-title">RIP Hop Count Meter — Tap Any Router</div>
      <div style="font-size:0.75rem;color:var(--muted);margin-bottom:8px;">RIP counts hops. Hop 16 = unreachable.</div>
      <div id="ad-rip-track" class="ad-hop-track" style="justify-content:center"></div>
      <div id="ad-rip-info" style="text-align:center;margin-top:10px;font-size:0.78rem;min-height:24px"></div>`;
    container.appendChild(card);
    const track = document.getElementById('ad-rip-track');
    const info = document.getElementById('ad-rip-info');
    for (let i=0; i<=16; i++) {
      if (i>0) { const a=document.createElement('span'); a.className='ad-hop-arrow'; a.textContent='—'; track.appendChild(a); }
      const n = document.createElement('div');
      n.className = 'ad-hop-node' + (i===16?' ad-hop-dead':'');
      const ratio = i/16;
      const r = Math.round(102 + 153*ratio), g = Math.round(110 - 110*ratio), b = Math.round(199 - 130*ratio);
      const c = i===16 ? '#444' : `rgb(${r},${g},${b})`;
      n.style.cssText = `background:${c}33;border:2px solid ${c}88;color:${c};font-size:0.6rem;font-weight:800;width:28px;height:28px`;
      n.textContent = i===16 ? '∞' : i;
      n.title = i===16 ? 'Unreachable (metric=16)' : `Hop ${i}`;
      n.addEventListener('click', () => {
        info.style.color = c;
        info.textContent = i===0 ? 'Hop 0 = source router' : i===16 ? '🚫 Hop 16 = UNREACHABLE — route is discarded!' : `Hop ${i}: ${16-i} hops remaining before unreachable`;
      });
      track.appendChild(n);
    }

  } else if (key === 'OSPF') {
    const color = '#ff9900';
    card.innerHTML = `<div class="lesson-section-title">OSPF Cost Calculator — Tap a Link Type</div>
      <div style="font-size:0.75rem;color:var(--muted);margin-bottom:8px;">Cost = 100 Mbps ÷ Interface Speed. Lower cost = preferred path.</div>
      <div class="ad-iface-row" id="ad-ospf-links" style="justify-content:center;flex-wrap:wrap;gap:8px"></div>
      <div id="ad-ospf-result" style="text-align:center;margin-top:12px;font-size:0.78rem;min-height:40px"></div>`;
    container.appendChild(card);
    const links = [
      { name:'Serial (64K)',    bw:0.064, cost:1562 },
      { name:'T1 (1.5M)',       bw:1.544, cost:64   },
      { name:'FastEth (100M)',  bw:100,   cost:1    },
      { name:'GigEth (1G)',     bw:1000,  cost:1    },
      { name:'10GigEth (10G)', bw:10000, cost:1    },
    ];
    const row = document.getElementById('ad-ospf-links');
    const res = document.getElementById('ad-ospf-result');
    links.forEach(l => {
      const el = document.createElement('div');
      el.className = 'ad-iface';
      el.textContent = l.name;
      el.style.cssText = `color:${color};border-color:${color}66;background:${color}11;font-size:0.68rem`;
      el.addEventListener('click', () => {
        res.innerHTML = `<span style="color:${color}">Cost = 100 ÷ ${l.bw} = <strong style="font-size:1rem">${l.cost}</strong></span><br>
          <span style="color:var(--muted);font-size:0.68rem">${l.cost===1?'⚠️ Same cost as FastEthernet — increase reference BW!':'Lower cost = preferred by OSPF'}</span>`;
      });
      row.appendChild(el);
    });

  } else if (key === 'EIGRP_int' || key === 'EIGRP_ext') {
    const color = key==='EIGRP_int' ? '#7b4fff' : '#ff4444';
    const isExt = key==='EIGRP_ext';
    card.innerHTML = `<div class="lesson-section-title">${isExt ? 'Redistribution — How External Routes Enter EIGRP' : 'EIGRP Successor vs Feasible Successor'}</div>`;
    if (isExt) {
      card.innerHTML += `<div class="ad-redist-box">
        <div class="ad-redist-row">
          <div class="ad-proto-pill" style="color:#ff9900;border-color:#ff990066;background:#ff990011">OSPF Domain</div>
          <div style="font-size:1.2rem">⟶</div>
          <div class="ad-proto-pill" style="color:#ffcc00;border-color:#ffcc0066;background:#ffcc0011">Border Router<br><span style="font-size:0.6rem">redistribute ospf into eigrp</span></div>
          <div style="font-size:1.2rem">⟶</div>
          <div class="ad-proto-pill" style="color:${color};border-color:${color}66;background:${color}11">EIGRP Domain<br><span style="font-size:0.6rem">D EX — AD 170</span></div>
        </div>
        <div class="ad-arrow-label" style="margin-top:6px">OSPF routes cross the border as EIGRP <strong>external</strong> routes (AD 170 — less trusted than internal AD 90)</div>
      </div>`;
    } else {
      card.innerHTML += `<div style="font-size:0.75rem;color:var(--muted);margin-bottom:8px;">Click a path to see if it qualifies as a Feasible Successor</div>
        <div class="ad-redist-box">
          <div class="ad-redist-row">
            <div class="ad-proto-pill" style="color:${color};border-color:${color}66;background:${color}11">Source</div>
            <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
              <div id="eigrp-path-a" class="ad-proto-pill" style="color:#00ff88;border-color:#00ff8866;background:#00ff8811;cursor:pointer">Path A: FD=50 (Successor)</div>
              <div id="eigrp-path-b" class="ad-proto-pill" style="color:#00d4ff;border-color:#00d4ff66;background:#00d4ff11;cursor:pointer">Path B: RD=30, FD=70</div>
              <div id="eigrp-path-c" class="ad-proto-pill" style="color:#ff4444;border-color:#ff444466;background:#ff444411;cursor:pointer">Path C: RD=60, FD=80</div>
            </div>
            <div class="ad-proto-pill" style="color:${color};border-color:${color}66;background:${color}11">Dest</div>
          </div>
          <div id="eigrp-path-info" style="font-size:0.75rem;text-align:center;min-height:32px;margin-top:4px;color:var(--muted)">Tap a path to check Feasibility Condition (RD &lt; Successor FD)</div>
        </div>`;
      setTimeout(()=>{
        const info = document.getElementById('eigrp-path-info');
        document.getElementById('eigrp-path-a')?.addEventListener('click',()=>{ info.style.color='#00ff88'; info.textContent='✅ Path A: Successor — best path (FD=50), installed in routing table.'; });
        document.getElementById('eigrp-path-b')?.addEventListener('click',()=>{ info.style.color='#00d4ff'; info.textContent='✅ Path B: Feasible Successor — RD(30) < Successor FD(50). Pre-computed backup ready for instant failover.'; });
        document.getElementById('eigrp-path-c')?.addEventListener('click',()=>{ info.style.color='#ff4444'; info.textContent='❌ Path C: NOT a FS — RD(60) ≥ Successor FD(50). Could cause loop. DUAL rejects it.'; });
      },100);
    }
    container.appendChild(card);
    return;

  } else if (key === 'Unknown') {
    const color = '#666688';
    card.innerHTML = `<div class="lesson-section-title">The AD Trust Spectrum</div>
      <div style="font-size:0.75rem;color:var(--muted);margin-bottom:10px;">Each source sits on a spectrum of trustworthiness — tap any dot to learn more</div>
      <div id="ad-spectrum-track" style="position:relative;height:60px;margin:10px 0;background:linear-gradient(90deg,#00ff8833,#00d4ff22,#7b4fff22,#ff990022,#ff6ec722,#ff444422,#33333322);border-radius:10px;border:1px solid rgba(255,255,255,0.1)"></div>
      <div id="ad-spectrum-info" style="text-align:center;font-size:0.78rem;min-height:28px;color:var(--muted)">Tap a dot above</div>`;
    container.appendChild(card);
    setTimeout(()=>{
      const track = document.getElementById('ad-spectrum-track');
      const info = document.getElementById('ad-spectrum-info');
      AD_SOURCES.forEach(s => {
        const dot = document.createElement('div');
        const pct = (s.ad/255)*88+4;
        dot.style.cssText = `position:absolute;left:${pct}%;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;background:${s.color};border:2px solid #fff3;cursor:pointer;transition:transform 0.2s;box-shadow:0 0 6px ${s.color}88`;
        dot.addEventListener('mouseenter',()=>dot.style.transform='translate(-50%,-50%) scale(1.4)');
        dot.addEventListener('mouseleave',()=>dot.style.transform='translate(-50%,-50%) scale(1)');
        dot.addEventListener('click',()=>{ info.style.color=s.color; info.textContent=`${s.label}: AD ${s.ad} — ${s.ad===255?'never installed in routing table':s.ad===0?'always preferred — directly connected':s.ad===1?'manually configured, highly trusted':'dynamic protocol route'}`; });
        track.appendChild(dot);
      });
    },100);
  }

  if (!card.parentNode) container.appendChild(card);
}

function renderADLesson(key) {
  const lesson = AD_LESSONS[key];
  if (!lesson) return;
  document.getElementById('ad-detail-title').textContent = lesson.icon + ' ' + lesson.title;
  const container = document.getElementById('ad-detail-content');
  container.innerHTML = '';

  // Intro card
  const intro = document.createElement('div');
  intro.className = 'lesson-card';
  intro.innerHTML = `<div class="lesson-section-title">${lesson.title}</div><div class="lesson-body">${lesson.intro}</div>`;
  container.appendChild(intro);

  // Interactive AD chart
  buildADChart(container, key);

  // Per-source visual
  buildADVisual(container, key);

  // Additional sections
  for (const sec of lesson.sections) {
    const card = document.createElement('div');
    card.className = 'lesson-card';
    if (sec.type === 'tip') {
      card.innerHTML = `<div class="lesson-section-title">${sec.title}</div><div class="lesson-tip">💡 ${sec.body}</div>`;
    } else {
      card.innerHTML = `<div class="lesson-section-title">${sec.title}</div><div class="lesson-body">${sec.body}</div>`;
    }
    container.appendChild(card);
  }

  showScreen('screen-ad');
  window.scrollTo(0,0);
}

// ── Quiz ─────────────────────────────────────────────────────────────────────
function startQuiz(topic) {
  state.currentTopic = topic;
  state.currentQuestions = shuffle(topic.questions).slice(0, 10);
  state.currentIndex = 0;
  state.currentCorrect = 0;
  state.missedQuestions = [];
  state.answered = false;
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.currentQuestions[state.currentIndex];
  const total = state.currentQuestions.length;

  document.getElementById('q-counter').textContent =
    `Question ${state.currentIndex + 1} / ${total}`;
  document.getElementById('q-progress').style.width =
    ((state.currentIndex / total) * 100) + '%';
  document.getElementById('q-category').textContent =
    state.currentTopic.name.toUpperCase();
  document.getElementById('q-text').textContent = q.q;

  const answersEl = document.getElementById('answers');
  answersEl.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.a.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="letter">${letters[i]}</span>${ans}`;
    btn.addEventListener('click', () => selectAnswer(i, q));
    answersEl.appendChild(btn);
  });

  document.getElementById('explanation').className = 'explanation';
  document.getElementById('btn-next').className = 'btn-primary';
  state.answered = false;

  startTimer(q);
}

function startTimer(q) {
  clearInterval(state.timer);
  state.timeLeft = 30;
  const display = document.getElementById('timer-val');
  const ring = document.getElementById('timer-display');
  display.textContent = state.timeLeft;
  ring.className = 'timer-ring';

  state.timer = setInterval(() => {
    state.timeLeft--;
    display.textContent = state.timeLeft;
    if (state.timeLeft <= 10) ring.className = 'timer-ring urgent';
    if (state.timeLeft <= 0) {
      clearInterval(state.timer);
      if (!state.answered) {
        selectAnswer(-1, q); // time's up — wrong
        toast('⏰ Time\'s up!');
      }
    }
  }, 1000);
}

function selectAnswer(selected, q) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timer);

  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b => b.disabled = true);

  const isCorrect = selected === q.correct;

  if (selected >= 0) {
    btns[selected].classList.add(isCorrect ? 'correct' : 'wrong');
  }
  if (!isCorrect) {
    btns[q.correct].classList.add('correct');
  }

  if (isCorrect) {
    state.currentCorrect++;
    state.streak++;
    toast('✅ Correct! +' + (state.streak > 2 ? ' 🔥 Streak x' + state.streak : ''));
  } else {
    state.streak = 0;
    state.missedQuestions.push(q);
    toast('❌ Wrong — check the explanation');
  }

  const exp = document.getElementById('explanation');
  exp.innerHTML = q.explain;
  exp.className = 'explanation show';

  document.getElementById('btn-next').className = 'btn-primary show';
  updateHUD();
  saveState();
}

function nextQuestion() {
  state.currentIndex++;
  if (state.currentIndex >= state.currentQuestions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ── Result ───────────────────────────────────────────────────────────────────
function showResult() {
  const total = state.currentQuestions.length;
  const correct = state.currentCorrect;
  const acc = Math.round((correct / total) * 100);

  const baseXP = correct * 10;
  const bonusXP = acc === 100 ? 50 : acc >= 80 ? 20 : 0;
  const earned = baseXP + bonusXP;

  state.xp += earned;
  state.topicScores[state.currentTopic.id] = Math.max(
    state.topicScores[state.currentTopic.id] || 0, acc
  );

  // Level up check
  let leveledUp = false;
  while (
    state.level < state.xpThresholds.length &&
    state.xp >= (state.xpThresholds[state.level] || Infinity)
  ) {
    state.level++;
    leveledUp = true;
  }

  saveState();
  updateHUD();

  document.getElementById('stat-correct').textContent = correct + '/' + total;
  document.getElementById('stat-acc').textContent = acc + '%';
  document.getElementById('stat-xp').textContent = '+' + earned;

  let icon, title, sub;
  if (acc === 100) { icon='🏆'; title='Perfect Score!'; sub='Flawless! You really know this topic.'; }
  else if (acc >= 80) { icon='🎉'; title='Great Work!'; sub='Solid understanding. Keep it up!'; }
  else if (acc >= 60) { icon='📚'; title='Keep Studying!'; sub='You\'re getting there — <a class="review-link" id="review-link">review the explanations</a>.'; }
  else { icon='💪'; title='Keep Practicing!'; sub='Don\'t give up — <a class="review-link" id="review-link">review the explanations</a> for missed answers.'; }

  document.getElementById('result-icon').textContent = leveledUp ? '⬆️' : icon;
  document.getElementById('result-title').textContent = leveledUp ? 'Level Up! → Level ' + state.level : title;
  document.getElementById('result-sub').innerHTML = leveledUp ? 'You reached Level ' + state.level + '! ' + sub : sub;

  const reviewPanel = document.getElementById('review-panel');
  reviewPanel.style.display = 'none';
  reviewPanel.innerHTML = '';

  const reviewLink = document.getElementById('review-link');
  if (reviewLink && state.missedQuestions.length > 0) {
    reviewLink.addEventListener('click', (e) => {
      e.preventDefault();
      if (reviewPanel.style.display === 'flex') {
        reviewPanel.style.display = 'none';
        reviewLink.textContent = 'review the explanations';
      } else {
        reviewPanel.innerHTML = '<div class="review-header">Missed Questions — ' + state.missedQuestions.length + ' to review</div>';
        state.missedQuestions.forEach((q, i) => {
          const div = document.createElement('div');
          div.className = 'review-item';
          div.innerHTML = `
            <div class="ri-q">${i + 1}. ${q.q}</div>
            <div class="ri-correct">✓ Correct answer: ${q.a[q.correct]}</div>
            <div class="ri-explain">${q.explain}</div>
          `;
          reviewPanel.appendChild(div);
        });
        reviewPanel.style.display = 'flex';
        reviewPanel.style.flexDirection = 'column';
        reviewPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        reviewLink.textContent = 'hide explanations';
      }
    });
  }

  const banner = document.getElementById('streak-banner');
  if (state.streak >= 5) {
    banner.textContent = '🔥 ' + state.streak + '-answer streak! You\'re on fire!';
    banner.className = 'streak-banner show';
  } else {
    banner.className = 'streak-banner';
  }

  showScreen('screen-result');
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('btn-next').addEventListener('click', nextQuestion);
document.getElementById('btn-retry').addEventListener('click', () => startQuiz(state.currentTopic));
document.getElementById('btn-topics').addEventListener('click', () => {
  renderTopics();
  showScreen('screen-topics');
});
document.getElementById('btn-learn-back').addEventListener('click', () => {
  renderTopics();
  showScreen('screen-topics');
});
document.getElementById('btn-start-quiz').addEventListener('click', () => startQuiz(state.currentTopic));
document.getElementById('btn-layer-back').addEventListener('click', () => {
  renderLesson(TOPICS.find(t => t.id === 'osi'));
});
document.getElementById('btn-layer-quiz').addEventListener('click', () => startQuiz(TOPICS.find(t => t.id === 'osi')));

});
document.getElementById('btn-protocol-quiz').addEventListener('click', () => startQuiz(TOPICS.find(t => t.id === 'osi')));
document.getElementById('btn-l3protocol-back').addEventListener('click', () => {
  renderLayerLesson(3);
});
document.getElementById('btn-ad-back').addEventListener('click', () => {
  renderLesson(TOPICS.find(t => t.id === 'routing'));
});
document.getElementById('btn-l3protocol-quiz').addEventListener('click', () => startQuiz(TOPICS.find(t => t.id === 'routing')));
document.getElementById('logo-home').addEventListener('click', () => {
  renderTopics();
  showScreen('screen-topics');
  window.scrollTo(0, 0);
});

// ── Theme toggle ─────────────────────────────────────────────────────────────
const themeBtn = document.getElementById('theme-toggle');
const isLight = localStorage.getItem('nq_theme') === 'light';
if (isLight) { document.body.classList.add('light'); themeBtn.textContent = '☀️'; }

themeBtn.addEventListener('click', () => {
  const light = document.body.classList.toggle('light');
  themeBtn.textContent = light ? '☀️' : '🌙';
  localStorage.setItem('nq_theme', light ? 'light' : 'dark');
});

loadState();
updateHUD();
renderTopics();
</script>
