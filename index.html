<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetQuest – CCNA Training</title>
<style>
  :root {
    --bg: #0f1729;
    --panel: #162035;
    --border: #243a60;
    --accent: #00d4ff;
    --accent2: #0066cc;
    --green: #00bb66;
    --red: #ff4466;
    --yellow: #ffcc00;
    --text: #e0eeff;
    --muted: #6b8ab0;
    --bg-gradient1: rgba(0,100,200,0.08);
    --bg-gradient2: rgba(0,212,255,0.05);
  }

  body.light {
    --bg: #f0f4fb;
    --panel: #ffffff;
    --border: #c5d5ea;
    --accent: #0066cc;
    --accent2: #004499;
    --green: #008844;
    --red: #cc2244;
    --yellow: #996600;
    --text: #0a1628;
    --muted: #5570a0;
    --bg-gradient1: rgba(0,80,180,0.05);
    --bg-gradient2: rgba(0,120,220,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 20% 20%, var(--bg-gradient1) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, var(--bg-gradient2) 0%, transparent 60%);
    transition: background 0.3s, color 0.3s;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 640px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0 20px;
  }

  .logo {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .logo span { color: var(--text); }

  .theme-toggle {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 1rem;
    transition: border-color 0.2s, transform 0.15s;
    line-height: 1;
  }
  .theme-toggle:hover { border-color: var(--accent); transform: scale(1.08); }

  .hud {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .hud-item strong {
    font-size: 1.1rem;
    color: var(--accent);
    font-weight: 700;
  }

  /* ── XP Bar ── */
  .xp-bar-wrap {
    width: 100%;
    max-width: 640px;
    margin-bottom: 20px;
  }
  .xp-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .xp-bar {
    height: 6px;
    background: var(--panel);
    border-radius: 99px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  /* ── Screen system ── */
  .screen { display: none; width: 100%; max-width: 640px; }
  .screen.active { display: flex; flex-direction: column; gap: 16px; }

  /* ── Topic Select ── */
  .screen-title {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--accent);
    text-align: center;
    margin-bottom: 4px;
  }
  .screen-sub {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 8px;
  }

  .topic-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .topic-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .topic-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 0 20px rgba(0,212,255,0.1);
  }
  .topic-card .icon { font-size: 2rem; margin-bottom: 8px; }
  .topic-card .name { font-size: 0.9rem; font-weight: 600; }
  .topic-card .count { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .topic-card .badge {
    position: absolute;
    top: 8px; right: 8px;
    background: var(--accent2);
    color: white;
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 99px;
    font-weight: 600;
  }
  .topic-card.completed .badge { background: var(--green); color: #000; }

  /* ── Quiz Screen ── */
  .quiz-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .timer-ring {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
  }
  .timer-ring.urgent { color: var(--red); animation: pulse 0.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .progress-bar {
    height: 4px;
    background: var(--panel);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent2);
    border-radius: 99px;
    transition: width 0.3s;
  }

  .question-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
  }

  .q-category {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 12px;
    font-weight: 600;
  }

  .q-text {
    font-size: 1.05rem;
    line-height: 1.6;
    font-weight: 500;
  }

  .answers {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .answer-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 0.9rem;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .answer-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,212,255,0.05);
  }
  .answer-btn .letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .answer-btn.correct {
    border-color: var(--green);
    background: rgba(0,255,136,0.08);
    color: var(--green);
  }
  .answer-btn.correct .letter { background: var(--green); color: #000; }
  .answer-btn.wrong {
    border-color: var(--red);
    background: rgba(255,68,102,0.08);
    color: var(--red);
  }
  .answer-btn.wrong .letter { background: var(--red); color: #fff; }
  .answer-btn:disabled { cursor: default; }

  /* ── Explanation ── */
  .explanation {
    background: rgba(0,212,255,0.05);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--text);
    display: none;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); }

  /* ── Next btn ── */
  .btn-primary {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #000;
    font-weight: 700;
    font-size: 0.95rem;
    border: none;
    border-radius: 10px;
    padding: 14px 24px;
    cursor: pointer;
    transition: opacity 0.2s;
    display: none;
    align-self: flex-end;
  }
  .btn-primary.show { display: block; }
  .btn-primary:hover { opacity: 0.85; }

  /* ── Result Screen ── */
  .result-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
  }
  .result-icon { font-size: 3.5rem; margin-bottom: 12px; }
  .result-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
  .result-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 8px;
  }
  .stat-box .val { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .stat-box .lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-top: 2px; }

  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.9rem;
    border-radius: 10px;
    padding: 12px 20px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .btn-secondary:hover { border-color: var(--accent); }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 0.85rem;
    transition: transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Streaks / badges ── */
  .streak-banner {
    background: linear-gradient(135deg, #ff6b00, #ffcc00);
    border-radius: 10px;
    padding: 12px 16px;
    color: #000;
    font-weight: 700;
    font-size: 0.9rem;
    text-align: center;
    display: none;
  }
  .streak-banner.show { display: block; }

  /* ── Review Panel ── */
  .review-link {
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
    font-style: normal;
  }
  .review-link:hover { color: #fff; }

  .review-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .review-item .ri-q {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .review-item .ri-wrong {
    font-size: 0.82rem;
    color: var(--red);
    margin-bottom: 6px;
  }
  .review-item .ri-correct {
    font-size: 0.82rem;
    color: var(--green);
    margin-bottom: 10px;
  }
  .review-item .ri-explain {
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--text);
    background: rgba(0,212,255,0.05);
    border-left: 2px solid var(--accent);
    padding: 10px 12px;
    border-radius: 6px;
  }
  .review-header {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 0;
  }

  /* ── Learn Screen ── */
  .learn-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .learn-back {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: border-color 0.2s;
  }
  .learn-back:hover { border-color: var(--accent); }

  .lesson-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .lesson-section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 2px;
  }
  .lesson-body {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
  }
  .lesson-body strong { color: var(--accent); }
  .lesson-body p { margin-bottom: 10px; }
  .lesson-body p:last-child { margin-bottom: 0; }

  .lesson-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    margin-top: 6px;
  }
  .lesson-table th {
    background: rgba(0,212,255,0.1);
    color: var(--accent);
    padding: 8px 10px;
    text-align: left;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  .lesson-table td {
    padding: 8px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--text);
    vertical-align: top;
  }
  .lesson-table tr:last-child td { border-bottom: none; }
  .lesson-table tr:hover td { background: rgba(255,255,255,0.02); }

  .lesson-tip {
    background: rgba(255,204,0,0.07);
    border: 1px solid rgba(255,204,0,0.25);
    border-left: 3px solid var(--yellow);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--text);
  }
  .lesson-tip strong { color: var(--yellow); }

  .lesson-diagram {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .layer-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.82rem;
  }
  .layer-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.75rem;
    flex-shrink: 0;
  }
  .layer-name { font-weight: 700; min-width: 100px; }
  .layer-link {
    font-weight: 700;
    min-width: 100px;
    text-decoration: underline;
    text-decoration-style: dotted;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .layer-link:hover { opacity: 0.75; }
  .layer-row { cursor: pointer; transition: filter 0.15s; }
  .layer-row:hover { filter: brightness(1.15); }
  .layer-detail { color: var(--muted); font-size: 0.78rem; }

  .topic-card .card-btns {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: center;
  }
  .btn-learn, .btn-quiz-sm {
    flex: 1;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s;
  }
  .btn-learn {
    background: rgba(0,212,255,0.12);
    color: var(--accent);
    border: 1px solid rgba(0,212,255,0.3);
  }
  .btn-learn:hover { background: rgba(0,212,255,0.22); }
  .btn-quiz-sm {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #000;
  }
  .btn-quiz-sm:hover { opacity: 0.85; }

  .btn-start-quiz {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #000;
    font-weight: 700;
    font-size: 1rem;
    border: none;
    border-radius: 10px;
    padding: 16px 24px;
    cursor: pointer;
    transition: opacity 0.2s;
    width: 100%;
  }
  .btn-start-quiz:hover { opacity: 0.85; }

  /* ── Visual Diagram Elements ── */
  .pkt-header {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin: 10px 0;
    font-size: 0.72rem;
  }
  .pkt-field {
    padding: 7px 6px;
    border-radius: 5px;
    text-align: center;
    font-weight: 700;
    line-height: 1.2;
    color: #000;
  }
  .pkt-label {
    font-size: 0.68rem;
    color: var(--muted);
    text-align: center;
    margin-top: 2px;
  }

  .flow-diagram {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin: 10px 0;
    justify-content: center;
  }
  .flow-node {
    padding: 8px 12px;
    border-radius: 8px;
    text-align: center;
    font-size: 0.78rem;
    font-weight: 600;
    border: 1px solid var(--border);
    background: var(--panel);
    min-width: 70px;
  }
  .flow-arrow {
    color: var(--accent);
    font-size: 1.1rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .state-chain {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin: 10px 0;
    align-items: center;
  }
  .state-box {
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 700;
    text-align: center;
    color: #000;
  }
  .state-arrow { color: var(--muted); font-size: 0.9rem; }

  .bar-chart { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-label { font-size: 0.75rem; font-weight: 600; min-width: 70px; color: var(--text); }
  .bar-track { flex: 1; background: var(--border); border-radius: 99px; height: 14px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 0.65rem; font-weight: 700; color: #000; transition: width 0.6s ease; }
  .bar-val { font-size: 0.72rem; color: var(--muted); min-width: 40px; }

  .topo-diagram {
    display: grid;
    gap: 6px;
    margin: 10px 0;
    font-size: 0.75rem;
  }
  .topo-node {
    padding: 8px 10px;
    border-radius: 8px;
    text-align: center;
    font-weight: 700;
    border: 2px solid;
  }
  .topo-link {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.7rem;
    gap: 4px;
  }
  .as-box {
    border: 2px dashed;
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .as-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  /* ── Subnet Animation ── */
  .subnet-anim {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
  }
  .sa-row-label {
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 6px;
    margin-bottom: 2px;
  }
  .sa-bits {
    display: flex;
    gap: 2px;
    flex-wrap: nowrap;
  }
  .sa-octet { display: flex; gap: 2px; }
  .sa-dot {
    width: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 700;
  }
  .sa-bit {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.72rem;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.25s, transform 0.25s, background 0.3s;
  }
  .sa-bit.visible { opacity: 1; transform: scale(1); }

  .sa-decimal-row {
    display: flex;
    gap: 2px;
    align-items: center;
  }
  .sa-dec-val {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.62rem;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .sa-dec-val.visible { opacity: 1; }
  .sa-dec-dot {
    width: 6px;
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
  }

  .sa-operator {
    text-align: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--yellow);
    padding: 4px 0;
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .sa-operator.visible { opacity: 1; }

  .sa-divider {
    height: 2px;
    background: linear-gradient(90deg, #00d4ff, #cc66ff, #00ff88);
    border-radius: 99px;
    margin: 4px 0;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .sa-divider.visible { opacity: 1; }

  .sa-result-label {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--green);
    text-align: center;
    padding: 8px;
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.5s;
    margin-top: 4px;
  }

function loadState() {
  const s = localStorage.getItem('netquest_state');
  if (s) {
    const saved = JSON.parse(s);
    Object.assign(state, saved);
  }
}

function saveState() {
  localStorage.setItem('netquest_state', JSON.stringify({
    xp: state.xp,
    level: state.level,
    streak: state.streak,
    topicScores: state.topicScores,
  }));
}

// ── UI Helpers ───────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toast(msg, duration = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function updateHUD() {
  document.getElementById('hud-level').textContent = state.level;
  document.getElementById('hud-xp').textContent = state.xp;
  document.getElementById('hud-streak').textContent = state.streak + '🔥';

  const currentThreshold = state.xpThresholds[state.level - 1] || 0;
  const nextThreshold = state.xpThresholds[state.level] || (currentThreshold + 500);
  const progress = ((state.xp - currentThreshold) / (nextThreshold - currentThreshold)) * 100;

  document.getElementById('xp-fill').style.width = Math.min(100, Math.max(0, progress)) + '%';
  document.getElementById('xp-label-left').textContent = 'Level ' + state.level;
  document.getElementById('xp-label-right').textContent = state.xp + ' / ' + nextThreshold + ' XP';
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderLayerLesson(layerNum) {
  const lesson = LAYER_LESSONS[layerNum];
  document.getElementById('layer-detail-title').textContent = 'Layer ' + lesson.num;
  const container = document.getElementById('layer-detail-content');
  container.innerHTML = '';

  // Layer banner
  const banner = document.createElement('div');
  banner.style.cssText = `background:${lesson.color}18;border:1px solid ${lesson.color}44;border-left:4px solid ${lesson.color};border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:4px;`;
  banner.innerHTML = `<div style="width:44px;height:44px;border-radius:50%;background:${lesson.color};color:#000;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;flex-shrink:0">${lesson.num}</div>
    <div><div style="font-size:1.15rem;font-weight:700;color:${lesson.color}">${lesson.name}</div>
    <div style="font-size:0.8rem;color:var(--muted)">OSI Layer ${lesson.num}</div></div>`;
  container.appendChild(banner);

  for (const section of lesson.sections) {
    const card = document.createElement('div');
    card.className = 'lesson-card';

    if (section.type === 'l3protocol_table') {
      const rows = section.rows.map(r =>
        `<tr><td><a class="proto-link review-link" data-l3proto="${r[0]}" style="cursor:pointer">${r[0]}</a></td>${r.slice(1).map(c=>`<td>${c}</td>`).join('')}</tr>`
      ).join('');
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div style="font-size:0.75rem;color:var(--muted);margin-bottom:6px;">Tap a protocol to learn more →</div>
        <table class="lesson-table">
          <thead><tr>${section.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      card.querySelectorAll('[data-l3proto]').forEach(link => {
        link.addEventListener('click', () => renderL3ProtocolLesson(link.dataset.l3proto));
      });
    } else if (section.type === 'protocol_table') {
      const rows = section.rows.map(r =>
        `<tr><td><a class="proto-link review-link" data-proto="${r[0]}" style="cursor:pointer">${r[0]}</a></td>${r.slice(1).map(c=>`<td>${c}</td>`).join('')}</tr>`
      ).join('');
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div style="font-size:0.75rem;color:var(--muted);margin-bottom:6px;">Tap a protocol to learn more →</div>
        <table class="lesson-table">
          <thead><tr>${section.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      card.querySelectorAll('.proto-link').forEach(link => {
        link.addEventListener('click', () => renderProtocolLesson(link.dataset.proto));
      });
    } else if (section.type === 'subnet_anim') {
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div class="lesson-body">${section.body}</div>
        <div id="subnet-anim-root"></div>`;
      container.appendChild(card);
      buildSubnetAnim(document.getElementById('subnet-anim-root'));
      continue;
    } else if (section.type === 'table') {
      const rows = section.rows.map(r => '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>').join('');
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <table class="lesson-table">
          <thead><tr>${section.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    } else if (section.type === 'tip') {
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div class="lesson-tip">💡 ${section.body}</div>`;
    } else if (section.type === 'body_then_table') {
      const rows = section.rows.map(r => '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>').join('');
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div class="lesson-body">${section.body}</div>
        <table class="lesson-table" style="margin-top:10px">
          <thead><tr>${section.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    } else {
      card.innerHTML = `<div class="lesson-section-title">${section.title}</div>
        <div class="lesson-body">${section.body}</div>`;
    }
    container.appendChild(card);
  }

  showScreen('screen-layer');
  window.scrollTo(0, 0);
}

// ── Subnet Animation ─────────────────────────────────────────────────────────
function buildSubnetAnim(root) {
  const IP   = [192, 168, 1, 130];
  const MASK = [255, 255, 255, 128];
  const RESULT = IP.map((b, i) => b & MASK[i]);
  const PREFIX = 25;

  function toBits(n) {
    return Array.from({length:8}, (_, i) => (n >> (7 - i)) & 1);
  }

  // Colors for each octet
  const octColors = ['#00d4ff','#7b4fff','#ff6ec7','#ff9900'];
  const maskColor  = '#ffcc00';
  const netColor   = '#00ff88';
  const hostColor  = '#444466';

  function bitColor(globalIdx, row) {
    if (row === 'ip')   return octColors[Math.floor(globalIdx / 8)];
    if (row === 'mask') return globalIdx < PREFIX ? maskColor : '#555';
    if (row === 'res')  return globalIdx < PREFIX ? netColor : hostColor;
    return '#888';
  }

  function renderBitRow(values, rowId, rowLabel) {
    const wrap = document.createElement('div');
    wrap.innerHTML = `<div class="sa-row-label">${rowLabel}</div>`;
    const bits = document.createElement('div');
    bits.className = 'sa-bits';
    bits.id = rowId;
    values.forEach((oct, oi) => {
      if (oi > 0) {
        const dot = document.createElement('div');
        dot.className = 'sa-dot';
        dot.textContent = '·';
        bits.appendChild(dot);
      }
      const g = document.createElement('div');
      g.className = 'sa-octet';
      toBits(oct).forEach((b, bi) => {
        const span = document.createElement('div');
        const gIdx = oi * 8 + bi;
        span.className = 'sa-bit';
        span.textContent = b;
        span.style.background = bitColor(gIdx, rowId) + '33';
        span.style.border = '1px solid ' + bitColor(gIdx, rowId) + '66';
        span.style.color = bitColor(gIdx, rowId);
        span.dataset.final = bitColor(gIdx, rowId);
        g.appendChild(span);
      });
      bits.appendChild(g);
    });
    wrap.appendChild(bits);
    return wrap;
  }

  function renderDecRow(values, colors) {
    const d = document.createElement('div');
    d.className = 'sa-decimal-row';
    values.forEach((v, i) => {
      if (i > 0) { const dot = document.createElement('div'); dot.className = 'sa-dec-dot'; dot.textContent = '.'; d.appendChild(dot); }
      const sp = document.createElement('div');
      sp.className = 'sa-dec-val';
      sp.style.background = (colors[i] || '#888') + '22';
      sp.style.color = colors[i] || '#888';
      sp.style.border = '1px solid ' + (colors[i] || '#888') + '55';
      sp.style.minWidth = '36px';
      sp.textContent = v;
      d.appendChild(sp);
    });
    return d;
  }

  // Build DOM
  const wrap = document.createElement('div');
  wrap.className = 'subnet-anim';

  // Legend
  const legend = document.createElement('div');
  legend.className = 'sa-legend';
  legend.innerHTML = `
    <div class="sa-legend-item"><div class="sa-legend-dot" style="background:#00ff8888;border:1px solid #00ff88"></div>Network bits (1–${PREFIX})</div>
    <div class="sa-legend-item"><div class="sa-legend-dot" style="background:#44446688;border:1px solid #666"></div>Host bits (${PREFIX+1}–32)</div>`;
  wrap.appendChild(legend);

  // IP row
  const ipRow = renderBitRow(IP, 'ip', '📘 IP Address — 192.168.1.130');
  wrap.appendChild(ipRow);
  wrap.appendChild(renderDecRow(IP, octColors));

  // Operator
  const op = document.createElement('div');
  op.className = 'sa-operator';
  op.textContent = '⊕  AND  (&)';
  wrap.appendChild(op);

  // Mask row
  const maskRow = renderBitRow(MASK, 'mask', '🟡 Subnet Mask — 255.255.255.128  (/25)');
  wrap.appendChild(maskRow);
  wrap.appendChild(renderDecRow(MASK, [maskColor, maskColor, maskColor, maskColor]));

  // Divider
  const div = document.createElement('div');
  div.className = 'sa-divider';
  wrap.appendChild(div);

  // Result row
  const resRow = renderBitRow(RESULT, 'res', '✅ Network Address — Result');
  wrap.appendChild(resRow);
  wrap.appendChild(renderDecRow(RESULT, [netColor, netColor, netColor, netColor]));

  // Final label
  const lbl = document.createElement('div');
  lbl.className = 'sa-result-label';
  lbl.innerHTML = '🌐 Network Address: <strong>192.168.1.128</strong> &nbsp;·&nbsp; Broadcast: <strong>192.168.1.255</strong> &nbsp;·&nbsp; Hosts: <strong>.129 – .254</strong>';
  wrap.appendChild(lbl);

  // Replay button
  const replay = document.createElement('button');
  replay.className = 'sa-replay';
  replay.textContent = '▶ Replay Animation';
  wrap.appendChild(replay);

  root.appendChild(wrap);

  function runAnim() {
    // Reset all
    wrap.querySelectorAll('.sa-bit, .sa-dec-val').forEach(el => {
      el.classList.remove('visible', 'pop');
      el.style.background = el.dataset.final ? el.dataset.final + '33' : '';
    });
    op.classList.remove('visible');
    div.classList.remove('visible');
    lbl.classList.remove('visible');
    wrap.querySelectorAll('.sa-dec-val').forEach(el => el.classList.remove('visible'));

    // Phase 1: IP bits appear (0–400ms)
    wrap.querySelectorAll('#ip .sa-bit').forEach((bit, i) => {
      setTimeout(() => { bit.classList.add('visible', 'pop'); }, i * 18);
    });
    // IP decimals
    wrap.querySelectorAll('.sa-decimal-row')[0]?.querySelectorAll('.sa-dec-val').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), 150 + i * 60);
    });

    // Phase 2: AND operator (450ms)
    setTimeout(() => op.classList.add('visible'), 500);

    // Phase 3: Mask bits (550–950ms)
    wrap.querySelectorAll('#mask .sa-bit').forEach((bit, i) => {
      setTimeout(() => { bit.classList.add('visible', 'pop'); }, 600 + i * 18);
    });
    wrap.querySelectorAll('.sa-decimal-row')[1]?.querySelectorAll('.sa-dec-val').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), 750 + i * 60);
    });

    // Phase 4: Divider (1000ms)
    setTimeout(() => div.classList.add('visible'), 1050);

    // Phase 5: Result bits light up one by one with color burst (1100–1700ms)
    const resBits = wrap.querySelectorAll('#res .sa-bit');
    resBits.forEach((bit, i) => {
      setTimeout(() => {
        bit.classList.add('visible', 'pop');
        // Network bits get full bright color
        if (i < PREFIX) {
          bit.style.background = netColor + 'aa';
          bit.style.border = '1px solid ' + netColor;
          bit.style.color = '#000';
          bit.style.fontWeight = '900';
        }
      }, 1150 + i * 22);
    });
    wrap.querySelectorAll('.sa-decimal-row')[2]?.querySelectorAll('.sa-dec-val').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), 1350 + i * 70);
    });

    // Phase 6: Final label (1850ms)
    setTimeout(() => lbl.classList.add('visible'), 1900);
  }

  replay.addEventListener('click', runAnim);
  // Auto-play after short delay on first render
  setTimeout(runAnim, 300);
}

      { title:'What is IPv4?', body:`<p><strong>IPv4 (Internet Protocol version 4)</strong> is the core protocol that makes the internet work. To start, every device on a network needs a unique identifier — and IPv4 provides that through <strong>32-bit IP addresses</strong>. It is responsible for addressing packets and routing them across interconnected networks from source to destination.</p><p>Furthermore, IPv4 is a <strong>connectionless, best-effort</strong> protocol — it does not guarantee delivery or order. Instead, those responsibilities fall to the Transport Layer (TCP). Despite being over 40 years old, IPv4 remains the dominant protocol in use today.</p>` },

      { title:'CCNA Exam Tip', type:'tip', body:'Know the <strong>TTL field</strong> — each router decrements it by 1. When it hits 0, the router drops the packet and sends an ICMP "Time Exceeded" message back. This is exactly how <strong>traceroute</strong> works. Also know: <strong>Protocol field 1=ICMP, 6=TCP, 17=UDP</strong>. These values appear in Wireshark captures and ACL questions.' },

    sections:[
      { title:'Why IPv6?', body:`<p><strong>IPv4 is running out of addresses.</strong> With only ~4.3 billion possible addresses, and billions of smartphones, IoT devices, and computers all needing IPs, the supply was essentially exhausted by 2011. In response, the industry developed <strong>IPv6</strong>, which uses <strong>128-bit addresses</strong> — providing 340 undecillion addresses (3.4 × 10³⁸). To put that in perspective, there are enough IPv6 addresses to give every grain of sand on Earth its own IP address — millions of times over.</p>` },
      { title:'IPv4 vs IPv6 at a Glance', body:`<p>Rather than replacing IPv4 overnight, the two protocols coexist during a long transition period. Here's how they compare:</p>`,
        type:'visual', html:`
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;font-size:0.78rem;">
  <div style="padding:10px;background:rgba(255,153,0,0.1);border:1px solid #ff9900;border-radius:8px;">
    <div style="font-weight:700;color:#ff9900;margin-bottom:8px;">IPv4</div>
    <div style="line-height:2;">📏 32-bit address<br>🔢 ~4.3 billion addresses<br>📝 Dotted decimal<br>⚙️ Manual or DHCP config<br>🧩 Header: 20–60 bytes<br>🔀 Routers can fragment<br>📡 Broadcast supported</div>
  </div>
  <div style="padding:10px;background:rgba(0,212,255,0.1);border:1px solid #00d4ff;border-radius:8px;">

    <div style="line-height:2;">📏 128-bit address<br>🔢 340 undecillion addresses<br>📝 Colon-hex notation<br>⚙️ SLAAC (auto-config)<br>🧩 Header: fixed 40 bytes<br>🔀 Endpoints fragment only<br>📡 Multicast replaces broadcast</div>
  </div>
</div>` },
      { title:'IPv6 Address Format', body:`<p>IPv6 addresses are written as <strong>eight groups of four hexadecimal digits</strong>, separated by colons. For example:</p><p style="text-align:center;font-size:1rem;font-weight:700;color:var(--accent);margin:12px 0;">2001:0DB8:AC10:FE01:0000:0000:0000:0001</p><p>Two shortening rules apply: <strong>First</strong>, leading zeros in each group can be dropped: <code>0DB8 → DB8</code>. <strong>Additionally</strong>, one sequence of all-zero groups can be replaced with <code>::</code>: the address above becomes <strong>2001:DB8:AC10:FE01::1</strong></p>` },
      { title:'IPv6 Address Types', type:'table', headers:['Type','Prefix','Purpose','Example'],
        rows:[['Global Unicast','2000::/3','Routable on the internet — like public IPv4','2001:DB8::/32'],['Link-Local','FE80::/10','Only within one network segment — auto-assigned','FE80::1'],['Loopback','::1/128','Same as 127.0.0.1 in IPv4','::1'],['Multicast','FF00::/8','One-to-many — replaces broadcast','FF02::1 = all nodes'],['Unique Local','FC00::/7','Private use — like RFC 1918','FD00::/8']] },
      { title:'IPv6 Header — Simpler Than IPv4', body:`<p>One major improvement in IPv6 is a <strong>simplified, fixed-length 40-byte header</strong>. In contrast to IPv4's variable-length header with fragmentation fields, IPv6 streamlines routing by removing rarely-used fields.</p>`,
        type:'visual', html:`
<div class="pkt-header" style="margin:10px 0;">

</div>
<div style="font-size:0.7rem;color:var(--muted)">No checksum, no fragmentation fields — routers process IPv6 headers faster as a result</div>` },
      { title:'SLAAC — Stateless Auto-Configuration', body:`<p>One of IPv6's most practical features is <strong>SLAAC (Stateless Address Autoconfiguration)</strong>. Instead of needing a DHCP server, a device can automatically generate its own IPv6 address by combining:</p><p>1. The <strong>network prefix</strong> (from the router's Router Advertisement message)<br>2. The device's own <strong>MAC address</strong> (converted to a 64-bit EUI-64 identifier)</p><p>As a result, devices can configure themselves the moment they connect — no DHCP server required.</p>` },
      { title:'CCNA Exam Tip', type:'tip', body:'Key IPv6 facts for the exam:<br><br>• IPv6 uses <strong>128-bit addresses</strong> in colon-hex notation<br>• <strong>::</strong> replaces consecutive all-zero groups (only once per address)<br>• Link-local addresses start with <strong>FE80::</strong> and are auto-assigned<br>• Loopback is <strong>::1</strong> (not 127.0.0.1)<br>• <strong>No broadcast</strong> in IPv6 — multicast is used instead<br>• ICMPv6 handles neighbor discovery (replaces ARP)' },

  ICMP: {
    name:'ICMP', fullName:'Internet Control Message Protocol', color:'#00ff88',
    sections:[
      { title:'What is ICMP?', body:`<p><strong>ICMP (Internet Control Message Protocol)</strong> is a Layer 3 protocol that network devices use to send <strong>error messages and operational information</strong>. To put it simply, when something goes wrong in the network — a router can't forward a packet, a host is unreachable, or a TTL expires — ICMP is the mechanism that reports it back to the sender.</p><p>Furthermore, ICMP is the engine behind two of the most commonly used network troubleshooting tools: <strong>ping</strong> and <strong>traceroute</strong>.</p>` },
      { title:'How Ping Works', body:`<p>Ping tests basic reachability between two devices using <strong>ICMP Echo Request and Echo Reply</strong> messages:</p>`,

<div style="margin:10px 0;">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">

    <div style="flex:1;text-align:center;">
      <div style="background:rgba(0,255,136,0.1);border:1px solid #00ff88;border-radius:6px;padding:5px 8px;font-size:0.72rem;font-weight:600;color:#00ff88;margin-bottom:4px;">→ ICMP Echo Request (Type 8)</div>
      <div style="background:rgba(0,212,255,0.1);border:1px solid #00d4ff;border-radius:6px;padding:5px 8px;font-size:0.72rem;font-weight:600;color:#00d4ff;">← ICMP Echo Reply (Type 0)</div>
    </div>
    <div class="flow-node" style="background:rgba(0,255,136,0.1);border-color:#00ff88;min-width:80px;text-align:center;">🌐 Dest<br><span style="font-size:0.68rem;font-weight:400">8.8.8.8</span></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;font-size:0.7rem;text-align:center;">
    <div style="padding:6px;background:rgba(0,255,136,0.1);border-radius:6px;"><strong style="color:#00ff88;">!</strong><br>Success</div>
    <div style="padding:6px;background:rgba(255,68,102,0.1);border-radius:6px;"><strong style="color:#ff4466;">.</strong><br>Timeout</div>
    <div style="padding:6px;background:rgba(255,153,0,0.1);border-radius:6px;"><strong style="color:#ff9900;">U</strong><br>Unreachable</div>
    <div style="padding:6px;background:rgba(255,204,0,0.1);border-radius:6px;"><strong style="color:#ffcc00;">?</strong><br>Unknown</div>
  </div>
</div>` },
      { title:'How Traceroute Works', body:`<p>Traceroute maps the path packets take by exploiting the <strong>TTL field</strong>. Here's how it works step by step:</p><p><strong>First</strong>, it sends a packet with TTL=1. The first router decrements TTL to 0, drops the packet, and sends back an <strong>ICMP Time Exceeded</strong> message — revealing its IP address. <strong>Next</strong>, it sends TTL=2 — identifying the second router. This continues, incrementing TTL each time, until the <strong>destination replies with ICMP Echo Reply</strong> — showing the full path.</p>`,
        type:'visual', html:`
<div style="margin:10px 0;font-size:0.75rem;">
  <div style="display:flex;flex-direction:column;gap:6px;">
